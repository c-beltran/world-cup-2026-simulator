<style>
  :root {
    --bg: #08120e; --ink: #e9f1ea; --muted: #82998c;
    --line: rgba(233, 241, 234, 0.10); --panel: rgba(233, 241, 234, 0.035);
    --gold: #f2cd5c; --gold-dim: #b8932f; --sim: #44c4ac; --ai: #b794f6;
    --up: #51d1a4; --down: #ff7a5c;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(1100px 700px at 50% -16%, #1a4632 0%, transparent 60%),
      radial-gradient(900px 640px at 50% 124%, #0c2316 0%, transparent 56%),
      #08160f;
    color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; line-height: 1.5;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 50% 50%, transparent 88px, rgba(233,241,234,.13) 89px, rgba(233,241,234,.13) 91px, transparent 92px),
      repeating-linear-gradient(0deg, rgba(180,235,200,.055) 0 7%, rgba(0,0,0,0) 7% 14%);
    mask: linear-gradient(180deg, transparent, #000 8%, #000 92%, transparent);
  }
  .wrap { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; padding: 16px 14px 90px; }
  .toplinks { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .backlink { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12.5px; text-decoration: none; font-weight: 600; }
  .backlink:hover { color: var(--ink); }
  #liveLink:hover { color: var(--gold); }
  header { display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 14px; }
  .titlerow { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  h1 { font-size: 21px; font-weight: 800; letter-spacing: -0.01em; margin: 0; } h1 .ball { color: var(--gold); }
  .tagline { color: var(--muted); font-size: 13px; }
  .langtoggle { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; flex: none; }
  .langtoggle button { border: 0; background: transparent; color: var(--muted); font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .08em; padding: 6px 11px; cursor: pointer; transition: .15s; }
  .langtoggle button.active { background: var(--sim); color: #06231c; }

  .verdict { margin-top: 16px; border: 1px solid var(--line); border-left: 3px solid var(--gold); border-radius: 12px; background: linear-gradient(180deg, rgba(242,205,92,.08), transparent 60%); padding: 16px 16px; }
  .verdict .big { font-size: 16px; font-weight: 700; line-height: 1.5; }
  .verdict .big b { color: var(--gold); }
  .podline { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 11px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .podline b { color: var(--ink); font-weight: 700; }
  .scores { display: flex; flex-wrap: wrap; gap: 10px 22px; margin-top: 13px; font-family: var(--mono); }
  .scores .s .n { font-size: 22px; font-weight: 800; } .scores .s .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .scores .s.good .n { color: var(--up); } .scores .s.gold .n { color: var(--gold); }

  .grid { display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 15px 14px; }
  .panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin: 0 0 4px; font-weight: 700; }
  .panel .sub { color: var(--muted); font-size: 11.5px; margin: 0 0 12px; }
  .chartbox { position: relative; height: 320px; }

  .receipts { display: grid; grid-template-columns: 1fr; gap: 11px; }
  .rcard { border: 1px solid var(--line); border-radius: 12px; padding: 12px 13px; background: rgba(255,255,255,.02); display: flex; gap: 11px; align-items: flex-start; }
  .rcard .flag { width: 34px; height: 23px; border-radius: 3px; object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,.4); background: #222; flex: none; margin-top: 2px; }
  .rcard .flagstack { display: flex; flex: none; margin-top: 2px; }
  .rcard .flagstack img { width: 24px; height: 16px; border-radius: 2px; object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,.5); margin-left: -7px; }
  .rcard .flagstack img:first-child { margin-left: 0; }
  .rcard .tag { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; display: inline-block; margin-bottom: 5px; }
  .rcard.champion .tag { background: var(--gold); color: #1a1206; } .rcard.favouriteFell .tag { background: rgba(255,122,92,.2); color: var(--down); }
  .rcard.darkHorse .tag { background: rgba(183,148,246,.2); color: var(--ai); } .rcard.chalk .tag { background: rgba(81,209,164,.18); color: var(--up); }
  .rcard .nm { font-weight: 800; font-size: 15px; } .rcard p { margin: 3px 0 0; font-size: 13px; color: var(--ink); line-height: 1.5; } .rcard p b { color: var(--gold); }

  table.cmp { width: 100%; border-collapse: collapse; }
  table.cmp th { font-family: var(--mono); font-size: 9px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; text-align: right; padding: 0 0 7px; }
  table.cmp th.l { text-align: left; }
  table.cmp td { padding: 6px 0; border-top: 1px solid var(--line); text-align: right; font-family: var(--mono); font-size: 12.5px; }
  table.cmp td.team { text-align: left; font-family: var(--sans); font-size: 13px; }
  table.cmp td.team .tin { display: flex; align-items: center; gap: 7px; }
  table.cmp td.team .flag { width: 20px; height: 13px; border-radius: 2px; object-fit: cover; background: #222; box-shadow: 0 0 0 1px rgba(0,0,0,.4); flex: none; }
  table.cmp td.team .rk { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  table.cmp td.model { color: var(--sim); font-weight: 700; }
  table.cmp td.res { font-family: var(--sans); color: var(--muted); font-size: 11.5px; }
  table.cmp td.res.deep { color: var(--up); font-weight: 600; } table.cmp td.res.champ { color: var(--gold); font-weight: 700; }

  .cal { display: grid; grid-template-columns: 1fr; gap: 9px; }
  .calrow { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px 12px; padding: 9px 0; border-bottom: 1px dashed var(--line); }
  .calrow:last-child { border-bottom: 0; }
  .calrow .cl { font-size: 13px; font-weight: 600; }
  .calrow .cl small { display: block; color: var(--muted); font-size: 11px; font-weight: 400; }
  .calrow .cv { font-family: var(--mono); font-size: 12.5px; text-align: right; white-space: nowrap; }
  .calrow .cv .pred { color: var(--muted); } .calrow .cv .act { color: var(--ink); font-weight: 700; } .calrow .cv .arw { color: var(--muted); margin: 0 4px; }
  .calnote { margin-top: 12px; font-size: 12px; color: var(--muted); line-height: 1.6; } .calnote b { color: var(--ink); }

  .method { margin-top: 18px; padding: 14px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel); font-size: 12px; color: var(--muted); line-height: 1.65; }
  .method b { color: var(--ink); } .method .em { color: var(--sim); font-weight: 600; }
  .method code { font-family: var(--mono); font-size: 11px; color: var(--ink); } .method a { color: var(--sim); text-decoration: none; } .method a:hover { text-decoration: underline; }

  @media (min-width: 720px) {
    .wrap { padding: 26px 26px 110px; }
    h1 { font-size: 26px; }
    .receipts { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="toplinks">
    <a class="backlink" href="index.html" id="backlink">← AI World Cup 2026 forecast</a>
    <a class="backlink" href="live.html" id="liveLink">🏆 Final result &amp; bracket →</a>
  </div>
  <header>
    <div class="titlerow">
      <div>
        <h1><span class="ball">●</span> <span id="h1">Did the model call it?</span></h1>
        <div class="tagline" id="tagline"></div>
      </div>
      <div class="langtoggle" id="langToggle" role="group" aria-label="Language">
        <button type="button" data-lang="en">EN</button><button type="button" data-lang="es">ES</button>
      </div>
    </div>
  </header>

  <div class="verdict">
    <div class="big" id="verdict"></div>
    <div class="podline" id="podline"></div>
    <div class="scores" id="scores"></div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2 id="recHead">The receipts — the calls that defined 2026</h2>
      <p class="sub" id="recSub"></p>
      <div class="receipts" id="receipts"></div>
    </div>

    <div class="panel">
      <h2 id="relHead">Reliability — predicted vs what happened</h2>
      <p class="sub" id="relSub"></p>
      <div class="chartbox"><canvas id="relChart"></canvas></div>
    </div>

    <div class="panel">
      <h2 id="calHead">It called the texture, too</h2>
      <p class="sub" id="calSub"></p>
      <div class="cal" id="cal"></div>
      <div class="calnote" id="calNote"></div>
    </div>

    <div class="panel">
      <h2 id="tblHead">How far the favourites went</h2>
      <p class="sub" id="tblSub"></p>
      <table class="cmp"><thead><tr><th class="l" id="cTeam">Team</th><th id="cModel">Model title odds</th><th id="cResult">How far</th></tr></thead><tbody id="tbl"></tbody></table>
    </div>
  </div>

  <div class="method" id="method"></div>
</div>

<script>
const R = window.WC_REPORT;
const FLAG = c => `https://flagcdn.com/w320/${c}.png`;
let LANG = (new URLSearchParams(location.search).get("lang") || localStorage.getItem("wc_lang") || "en").toLowerCase();
if (LANG !== "es") LANG = "en";
document.documentElement.lang = LANG;
const TEAM_ES = (R.meta && R.meta.teamNamesEs) || {};
const teamName = n => (LANG === "es" && TEAM_ES[n]) ? TEAM_ES[n] : n;
const pc = x => (100 * x).toFixed(x >= 0.1 ? 0 : 1);
const pc1 = x => (100 * x).toFixed(1);

const RSHORT = {
  en: { group: "Group stage", r16: "Round of 16", qf: "Quarter-finals", sf: "Semi-finals", final: "Final", title: "Champions" },
  es: { group: "Fase de grupos", r16: "Octavos", qf: "Cuartos", sf: "Semifinales", final: "Final", title: "Campeón" },
};
// how far a team got, as a short badge ("out in the …" phrasing lives in the receipts)
const REACHED = {
  en: { group: "Group stage", r16: "Round of 16", qf: "Quarter-final", sf: "Semi-final", final: "Runner-up", title: "Champion" },
  es: { group: "Fase de grupos", r16: "Octavos", qf: "Cuartos", sf: "Semifinal", final: "Subcampeón", title: "Campeón" },
};
const I18N = {
  en: {
    back: "← AI World Cup 2026 forecast", live: "🏆 Final result & bracket →",
    h1: "Did the model call it?",
    tagline: "The honest grade: the <b style='color:var(--sim)'>frozen pre-tournament</b> forecast — 50,000 simulations run <i>before</i> a ball was kicked, never re-baked — laid over the real 2026 World Cup. No hindsight.",
    verdict: "Graded against the frozen forecast, the model's <b>#{rank} pick {champ}</b> lifted the trophy, its <b>top four</b> were the exact final four, and the real final was its <b>single most-likely</b> pairing.",
    podChamp: "Champion", podRunner: "Runner-up", podThird: "3rd", podFourth: "4th",
    sChamp: "called the champion?", sChampYes: "{champ}, its #{rank} pick",
    sFour: "of the final four", sFourV: "top seeds held", sFinal: "predicted final", sFinalV: "its #1 pairing",
    sBrier: "Brier (lower better)", sBase: "naive baseline",
    recHead: "The receipts — the calls that defined 2026", recSub: "Four concrete predictions, and what actually happened.",
    relHead: "Reliability — predicted vs what happened", relSub: "Each dot is a bucket of the model's reach predictions (reach the R16 / QF / SF / final / title). On the dashed line = perfectly calibrated. Dot size = how many predictions fell in that bucket — the high-confidence buckets are sparse, so they're noisy.",
    relPerfect: "perfect calibration", relModel: "model (predicted → observed)", xAxis: "predicted probability", yAxis: "observed frequency",
    calHead: "It called the texture, too", calSub: "Beyond who won — how the knockouts played out vs what the model expected.",
    calPens: "Went to penalties", calPensS: "of 32 knockout games", calEt: "Went to extra time", calEtS: "of 32 knockout games", calUpset: "Knockout upsets", calUpsetS: "lower-ranked side won",
    calPred: "predicted", calAct: "actual",
    calNote: "The shootout and extra-time rates land almost exactly on the model's numbers. The one real divergence: this was a <b>chalk-leaning</b> bracket — fewer upsets than an average simulation — which is exactly why the top seeds held all the way to the semis.",
    tblHead: "How far the favourites went", tblSub: "The model's pre-tournament title odds (top 12) against where each team actually finished. No betting-market column — see the method note.",
    cTeam: "Team", cModel: "Model title odds", cResult: "How far",
    rChampion: "The model's <b>#{rank}</b> pick at <b>{p}%</b> — and {name} won it all. No team ever tops ~14%: one side beating a bracket of knockout rounds is genuinely hard, so even a called champion is a low-teens shot.",
    rChalk: "The model's four likeliest champions — {list} — were <b>exactly</b> the four semi-finalists ({hits}/4). The chalk held at the very top of the field.",
    rDarkHorse: "Given just <b>{p}%</b> to win it all, {name} stormed to the <b>{round}</b> — knocking out {victim} (the model's #{vrank}) on the way. The tournament's signature longshot run.",
    rFavouriteFell: "A genuine contender at <b>{p}%</b> (the model's #{rank}). Out in the <b>{round}</b>. Even a top pick is far likelier to fall than to win — and this one did.",
    methodTitle: "How this stays honest.",
    method: "The graded model is the <b>frozen pre-tournament forecast</b> — <span class='em'>50,000 conditional simulations</span> from the genuine pre-tournament FIFA ranking ({rsnap}) and the real draw, built before kickoff and <b>never re-baked</b> (it is a static file, untouched by the daily live re-forecast). Every one of {n} reach predictions is scored against the real result. Calibration on a single {ko}-game knockout run is inherently noisy — especially the sparse high-confidence buckets — so read the trend, not any one dot. Neutral venue, field rank 1–48.",
    methodMkt: "No betting-market comparison: unlike the 2022 backtest, there is no single, cleanly-dated 2026 outright source in this repo — and inventing one would be dishonest. ",
    methodSrc: "Sources — ratings: FIFA/Coca-Cola Men's World Ranking ({rsnap}); results: ",
  },
  es: {
    back: "← Pronóstico Mundial 2026 con IA", live: "🏆 Resultado final y cuadro →",
    h1: "¿Lo acertó el modelo?",
    tagline: "La nota honesta: el pronóstico <b style='color:var(--sim)'>congelado previo</b> — 50.000 simulaciones corridas <i>antes</i> del primer partido, sin rehacer — sobre el Mundial 2026 real. Sin ventaja del diario.",
    verdict: "Evaluado contra el pronóstico congelado, el <b>candidato #{rank}, {champ}</b>, levantó el trofeo, su <b>top cuatro</b> fue exactamente el cuarteto de semifinalistas, y la final real fue su pareja <b>más probable</b>.",
    podChamp: "Campeón", podRunner: "Subcampeón", podThird: "3º", podFourth: "4º",
    sChamp: "¿acertó al campeón?", sChampYes: "{champ}, su candidato #{rank}",
    sFour: "de las semifinales", sFourV: "los cabezas de serie aguantaron", sFinal: "final predicha", sFinalV: "su pareja #1",
    sBrier: "Brier (menor = mejor)", sBase: "base ingenua",
    recHead: "Las pruebas — las jugadas que definieron 2026", recSub: "Cuatro predicciones concretas, y lo que realmente pasó.",
    relHead: "Fiabilidad — predicho vs lo ocurrido", relSub: "Cada punto es un grupo de predicciones de avance (llegar a 8vos / 4tos / semis / final / título). Sobre la línea = perfectamente calibrado. El tamaño = cuántas predicciones cayeron ahí — los grupos de alta confianza son escasos y ruidosos.",
    relPerfect: "calibración perfecta", relModel: "modelo (predicho → observado)", xAxis: "probabilidad predicha", yAxis: "frecuencia observada",
    calHead: "También acertó la textura", calSub: "Más allá de quién ganó — cómo se jugaron las eliminatorias frente a lo que esperaba el modelo.",
    calPens: "A los penales", calPensS: "de 32 eliminatorias", calEt: "A la prórroga", calEtS: "de 32 eliminatorias", calUpset: "Sorpresas", calUpsetS: "ganó el peor clasificado",
    calPred: "predicho", calAct: "real",
    calNote: "Las tasas de penales y prórroga caen casi exactas sobre los números del modelo. La única divergencia real: fue un cuadro <b>de pronóstico</b> — menos sorpresas que una simulación media — que es justo por lo que los cabezas de serie aguantaron hasta semifinales.",
    tblHead: "Hasta dónde llegaron los favoritos", tblSub: "La probabilidad de título previa del modelo (top 12) frente a dónde terminó cada uno. Sin columna de mercado — ver la nota de método.",
    cTeam: "Selección", cModel: "Prob. de título", cResult: "Hasta dónde",
    rChampion: "El candidato <b>#{rank}</b> del modelo con <b>{p}%</b> — y {name} lo ganó todo. Ninguno supera ~14%: que un equipo gane una llave entera de eliminatorias es difícil, así que hasta un campeón acertado ronda el 10-14%.",
    rChalk: "Los cuatro campeones más probables del modelo — {list} — fueron <b>exactamente</b> los cuatro semifinalistas ({hits}/4). El pronóstico aguantó en lo más alto.",
    rDarkHorse: "Con solo <b>{p}%</b> para ganarlo todo, {name} llegó a <b>{round}</b> — eliminando a {victim} (el #{vrank} del modelo) en el camino. La sorpresa emblemática del torneo.",
    rFavouriteFell: "Un candidato real con <b>{p}%</b> (el #{rank} del modelo). Fuera en <b>{round}</b>. Hasta un favorito es mucho más probable que caiga a que gane — y este cayó.",
    methodTitle: "Cómo se mantiene honesto.",
    method: "El modelo evaluado es el <b>pronóstico congelado previo</b> — <span class='em'>50.000 simulaciones condicionales</span> desde el ranking FIFA genuinamente previo ({rsnap}) y el sorteo real, construido antes del inicio y <b>nunca rehecho</b> (es un archivo estático, ajeno al re-pronóstico diario en vivo). Cada una de las {n} predicciones de avance se evalúa contra el resultado real. La calibración sobre una sola llave de {ko} partidos es ruidosa — sobre todo los grupos escasos de alta confianza — así que mira la tendencia, no un punto. Sede neutral, ranking de campo 1–48.",
    methodMkt: "Sin comparación con el mercado de apuestas: a diferencia del backtest de 2022, no hay una fuente de cuotas de campeón 2026 con fecha limpia en este repo — e inventarla sería deshonesto. ",
    methodSrc: "Fuentes — valoraciones: Ranking Mundial FIFA/Coca-Cola ({rsnap}); resultados: ",
  },
};
const t = (k, p) => { let s = (I18N[LANG] && I18N[LANG][k] != null) ? I18N[LANG][k] : (I18N.en[k] || k); if (p) for (const key in p) s = s.split("{" + key + "}").join(p[key]); return s; };
const rl = r => (REACHED[LANG][r] || r);

let chart = null;
function render() {
  const m = R.meta, cal = R.calibration;
  document.querySelectorAll("#langToggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === LANG));
  const lp = LANG === "es" ? "?lang=es" : "";
  document.getElementById("backlink").textContent = t('back'); document.getElementById("backlink").href = "index.html" + lp;
  document.getElementById("liveLink").textContent = t('live'); document.getElementById("liveLink").href = "live.html" + lp;
  document.getElementById("h1").textContent = t('h1');
  document.getElementById("tagline").innerHTML = t('tagline');

  // ---- verdict + podium line + scores ----
  document.getElementById("verdict").innerHTML = t('verdict', { rank: R.champion.rank, champ: teamName(R.champion.name) });
  const f = R.finish;
  document.getElementById("podline").innerHTML =
    `<span>🥇 <b>${teamName(f.champion)}</b> · ${t('podChamp')}</span>` +
    `<span>🥈 <b>${teamName(f.runnerUp)}</b> · ${t('podRunner')}</span>` +
    `<span>🥉 <b>${teamName(f.third)}</b> · ${t('podThird')}</span>` +
    `<span>${t('podFourth')} <b>${teamName(f.fourth)}</b></span>`;
  document.getElementById("scores").innerHTML =
    `<div class="s gold"><div class="n">✓</div><div class="l">${t('sChampYes', { champ: teamName(R.champion.name), rank: R.champion.rank })}</div></div>` +
    `<div class="s good"><div class="n">${R.chalk.hits}/4</div><div class="l">${t('sFour')} · ${t('sFourV')}</div></div>` +
    `<div class="s gold"><div class="n">#${R.finalCall.rank}</div><div class="l">${t('sFinal')} · ${t('sFinalV')}</div></div>` +
    `<div class="s good"><div class="n">${cal.brier.toFixed(3)}</div><div class="l">${t('sBrier')} · ${cal.brierBaseline.toFixed(3)} ${t('sBase')}</div></div>`;

  // ---- receipts ----
  document.getElementById("recHead").textContent = t('recHead');
  document.getElementById("recSub").textContent = t('recSub');
  document.getElementById("receipts").innerHTML = R.receipts.map(r => {
    let body = "", flag = "", tag = "";
    if (r.kind === "champion") { body = t('rChampion', { rank: r.rank, p: pc(r.titlePct), name: teamName(r.name) }); flag = `<img class="flag" src="${FLAG(r.code)}" alt="">`; tag = RSHORT[LANG].title; }
    else if (r.kind === "chalk") { body = t('rChalk', { list: r.top4.map(x => teamName(x.name)).join(", "), hits: r.hits }); flag = `<div class="flagstack">${r.top4.map(x => `<img src="${FLAG(x.code)}" alt="">`).join("")}</div>`; tag = RSHORT[LANG].sf; }
    else if (r.kind === "darkHorse") { body = t('rDarkHorse', { p: pc(r.titlePct), name: teamName(r.name), round: rl(r.reached), victim: teamName(r.victim), vrank: r.victimRank }); flag = `<img class="flag" src="${FLAG(r.code)}" alt="">`; tag = RSHORT[LANG][r.reached]; }
    else if (r.kind === "favouriteFell") { body = t('rFavouriteFell', { p: pc(r.titlePct), rank: r.rank, round: rl(r.reached) }); flag = `<img class="flag" src="${FLAG(r.code)}" alt="">`; tag = RSHORT[LANG][r.reached]; }
    const title = r.kind === "chalk" ? `${teamName(r.top4[0].name)} · ${teamName(r.top4[1].name)} · ${teamName(r.top4[2].name)} · ${teamName(r.top4[3].name)}` : teamName(r.name);
    return `<div class="rcard ${r.kind}">${flag}<div><span class="tag">${tag}</span><div class="nm">${title}</div><p>${body}</p></div></div>`;
  }).join("");

  // ---- reliability chart ----
  document.getElementById("relHead").textContent = t('relHead');
  document.getElementById("relSub").textContent = t('relSub');
  const bins = cal.reliability.filter(b => b.n > 0);
  const maxN = Math.max(...bins.map(b => b.n));
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("relChart"), {
    data: {
      datasets: [
        { type: "line", label: t('relPerfect'), data: [{ x: 0, y: 0 }, { x: 100, y: 100 }], borderColor: "rgba(233,241,234,.35)", borderDash: [5, 5], borderWidth: 1.5, pointRadius: 0, fill: false },
        { type: "scatter", label: t('relModel'), data: bins.map(b => ({ x: b.meanP * 100, y: b.obs * 100, n: b.n })),
          backgroundColor: "rgba(68,196,172,.7)", borderColor: "#44c4ac",
          pointRadius: ctx => 4 + 12 * (ctx.raw.n / maxN), pointHoverRadius: ctx => 6 + 12 * (ctx.raw.n / maxN) },
      ],
    },
    options: {
      maintainAspectRatio: false,
      scales: {
        x: { type: "linear", min: 0, max: 100, title: { display: true, text: t('xAxis'), color: "#82998c", font: { size: 11 } }, grid: { color: "rgba(255,255,255,.05)" }, ticks: { color: "#82998c", callback: v => v + "%" } },
        y: { type: "linear", min: 0, max: 100, title: { display: true, text: t('yAxis'), color: "#82998c", font: { size: 11 } }, grid: { color: "rgba(255,255,255,.05)" }, ticks: { color: "#82998c", callback: v => v + "%" } },
      },
      plugins: {
        legend: { labels: { color: "#e9f1ea", font: { size: 11 }, usePointStyle: true, filter: i => i.text } },
        tooltip: { callbacks: { label: c => c.raw.n != null ? `predicted ${c.parsed.x.toFixed(0)}% → observed ${c.parsed.y.toFixed(0)}% (n=${c.raw.n})` : "" } },
      },
    },
  });

  // ---- knockout-texture calibration ----
  document.getElementById("calHead").textContent = t('calHead');
  document.getElementById("calSub").textContent = t('calSub');
  const calRow = (lab, sub, pred, act) => `<div class="calrow"><div class="cl">${lab}<small>${sub}</small></div>
    <div class="cv"><span class="pred">${t('calPred')} ${pc1(pred)}%</span><span class="arw">→</span><span class="act">${t('calAct')} ${pc1(act)}%</span></div></div>`;
  document.getElementById("cal").innerHTML =
    calRow(t('calPens'), t('calPensS'), R.method.pens.pred, R.method.pens.actual) +
    calRow(t('calEt'), t('calEtS'), R.method.et.pred, R.method.et.actual) +
    calRow(t('calUpset'), t('calUpsetS'), R.method.upset.pred, R.method.upset.actual);
  document.getElementById("calNote").innerHTML = t('calNote');

  // ---- favourites table ----
  document.getElementById("tblHead").textContent = t('tblHead');
  document.getElementById("tblSub").textContent = t('tblSub');
  document.getElementById("cTeam").textContent = t('cTeam'); document.getElementById("cModel").textContent = t('cModel'); document.getElementById("cResult").textContent = t('cResult');
  document.getElementById("tbl").innerHTML = R.outright.slice(0, 12).map(o => {
    const cls = o.reached === "title" ? "champ" : ["final", "sf", "qf"].includes(o.reached) ? "deep" : "";
    return `<tr>
      <td class="team"><span class="tin"><img class="flag" src="${FLAG(o.code)}" alt="">${teamName(o.name)} <span class="rk">#${o.fieldRank}</span></span></td>
      <td class="model">${pc1(o.prob.title)}%</td>
      <td class="res ${cls}">${rl(o.reached)}</td>
    </tr>`;
  }).join("");

  // ---- method ----
  document.getElementById("method").innerHTML =
    `<b>${t('methodTitle')}</b> ${t('method', { rsnap: m.ratingSnapshot, n: cal.n, ko: R.method.koGames })}<br><br>` +
    `${t('methodMkt')}<br><br>` +
    `<span style="font-family:var(--mono);font-size:11px">${t('methodSrc', { rsnap: m.ratingSnapshot })}<a href="${m.sources.resultsUrl}" target="_blank" rel="noopener">openfootball</a> (${m.sources.asOfDate}).</span>`;
}
document.querySelectorAll("#langToggle button").forEach(b => b.onclick = () => {
  if (b.dataset.lang === LANG) return;
  LANG = b.dataset.lang; localStorage.setItem("wc_lang", LANG); document.documentElement.lang = LANG; render();
});
render();
</script>
</body>
</html>
