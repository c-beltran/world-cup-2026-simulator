<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AI World Cup 2026 — Live Re-Forecast</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2308160f'/%3E%3Ccircle cx='16' cy='16' r='7.5' fill='%23f2cd5c'/%3E%3C/svg%3E">
<meta name="theme-color" content="#08160f">
<meta name="color-scheme" content="dark">
<meta name="description" content="A live, conditional Monte Carlo of the 2026 World Cup — real results clamped in, ratings updated on the pitch by FIFA's own formula, the rest re-simulated. Updated odds + next-match predictions.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="AI World Cup 2026">
<meta property="og:url" content="https://c-beltran.github.io/world-cup-2026-simulator/live.html">
<meta property="og:title" content="AI World Cup 2026 — Live Re-Forecast">
<meta property="og:description" content="Real results clamped in, ratings updated on the pitch, the rest re-simulated. Live title odds + next-match predictions.">
<meta property="og:image" content="https://c-beltran.github.io/world-cup-2026-simulator/og.png">
<meta property="og:image:type" content="image/png">

<meta property="og:image:height" content="630">

<script src="live-data.js"></script>
<style>
  /* ---- MOBILE-FIRST: base styles target a phone; min-width queries widen later. ---- */
  :root {
    --bg: #08120e; --ink: #e9f1ea; --muted: #82998c;
    --line: rgba(233, 241, 234, 0.10); --panel: rgba(233, 241, 234, 0.035);
    --gold: #f2cd5c; --gold-dim: #b8932f; --sim: #44c4ac; --ai: #b794f6;
    --up: #51d1a4; --down: #ff7a5c; --draw: #8aa0b4; --loss: #5d7268;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(1100px 700px at 50% -16%, #1a4632 0%, transparent 60%),
      radial-gradient(900px 640px at 50% 124%, #0c2316 0%, transparent 56%),
      #08160f;
    color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; line-height: 1.5;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 50% 50%, transparent 88px, rgba(233,241,234,.14) 89px, rgba(233,241,234,.14) 91px, transparent 92px),
      repeating-linear-gradient(0deg, rgba(180,235,200,.06) 0 7%, rgba(0,0,0,0) 7% 14%);
    mask: linear-gradient(180deg, transparent, #000 8%, #000 92%, transparent);
  }
  .wrap { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 16px 14px 90px; }

  /* ---- header ---- */
  .backlink { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12.5px; text-decoration: none; font-weight: 600; margin-bottom: 12px; }
  .backlink:hover { color: var(--ink); }
  header { display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 14px; }
  .titlerow { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  h1 { font-size: 21px; font-weight: 800; letter-spacing: -0.01em; margin: 0; } h1 .ball { color: var(--gold); }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--up); box-shadow: 0 0 0 0 rgba(81,209,164,.6); animation: pulse 2s infinite; margin-right: 2px; vertical-align: middle; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(81,209,164,.5);} 70%{ box-shadow: 0 0 0 7px rgba(81,209,164,0);} 100%{ box-shadow:0 0 0 0 rgba(81,209,164,0);} }
  .tagline { color: var(--muted); font-size: 13px; }
  .langtoggle { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; flex: none; }
  .langtoggle button { border: 0; background: transparent; color: var(--muted); font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .08em; padding: 6px 11px; cursor: pointer; transition: .15s; }
  .langtoggle button.active { background: var(--sim); color: #06231c; }

  /* as-of stamp */
  .stamp { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px; margin-top: 6px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .stamp b { color: var(--ink); font-weight: 700; }
  .stamp .prog { flex: 1 1 140px; min-width: 130px; height: 6px; border-radius: 999px; background: var(--panel); overflow: hidden; border: 1px solid var(--line); }
  .stamp .prog > i { display: block; height: 100%; background: linear-gradient(90deg, var(--sim), var(--gold)); }
  .stamp a { color: var(--sim); text-decoration: none; } .stamp a:hover { text-decoration: underline; }

  /* ---- panels ---- */
  .grid { display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 15px 14px; }
  .panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin: 0 0 4px; font-weight: 700; }
  .panel .sub { color: var(--muted); font-size: 11.5px; margin: 0 0 12px; }

  /* odds rows (title race / advancement) */
  .oddsrow { display: grid; grid-template-columns: 22px 1fr auto; align-items: center; gap: 9px; padding: 7px 0; border-bottom: 1px dashed var(--line); }
  .oddsrow:last-child { border-bottom: 0; }
  .oddsrow .flag { width: 22px; height: 15px; border-radius: 2px; object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,.4); background: #222; }
  .oddsrow .nm { font-size: 13.5px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .oddsrow .nm .rk { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: 5px; }
  .oddsrow .bar { grid-column: 2 / 3; height: 5px; border-radius: 999px; background: rgba(255,255,255,.06); margin-top: 4px; overflow: hidden; }
  .oddsrow .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
  .oddsrow .val { text-align: right; font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .delta { font-family: var(--mono); font-size: 10.5px; font-weight: 700; display: block; margin-top: 2px; }
  .delta.up { color: var(--up); } .delta.down { color: var(--down); } .delta.flat { color: var(--muted); }

  /* next-match cards */
  .fixtures { display: flex; flex-direction: column; gap: 11px; }
  .fx { border: 1px solid var(--line); border-radius: 12px; padding: 12px 13px; background: linear-gradient(180deg, rgba(68,196,172,.05), transparent 60%); }
  .fx.next { border-color: var(--gold-dim); box-shadow: 0 0 18px rgba(242,205,92,.10); }
  .fx .fxhead { display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .06em; margin-bottom: 9px; }
  .fx .fxhead .grp { color: var(--sim); }
  .fx .teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .fx .side { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .fx .side.away { justify-content: flex-end; text-align: right; }
  .fx .side .flag { width: 24px; height: 16px; border-radius: 2px; object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,.4); background:#222; flex: none; }
  .fx .side .nm { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fx .score { font-family: var(--mono); font-weight: 800; font-size: 17px; text-align: center; letter-spacing: 1px; }
  .fx .score small { display: block; font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: .08em; }
  .wdl { margin-top: 11px; }
  .wdl .track { display: flex; height: 8px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.05); }
  .wdl .track > span { display: block; height: 100%; }
  .wdl .seg-h { background: var(--sim); } .wdl .seg-d { background: var(--draw); } .wdl .seg-a { background: var(--gold-dim); }
  .wdl .labels { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10.5px; margin-top: 5px; color: var(--muted); }
  .wdl .labels b { color: var(--ink); }
  /* date-grouped fixtures + show-more */
  .fxgroup + .fxgroup { margin-top: 18px; }
  .fxday { display: flex; align-items: baseline; flex-wrap: wrap; gap: 9px; margin: 0 0 11px; padding-bottom: 7px; border-bottom: 1px solid var(--line); }
  .fxday .d { font-family: var(--mono); font-size: 12.5px; font-weight: 700; color: var(--ink); letter-spacing: .03em; }
  .fxday .cnt { font-family: var(--mono); font-size: 10.5px; color: var(--muted); }
  .fxday .daytag { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .1em; color: #06231c; background: var(--gold); border-radius: 999px; padding: 2px 8px; }
  .fxmore { margin-top: 16px; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; background: var(--panel); border: 1px solid var(--gold-dim); color: var(--gold); border-radius: 999px; padding: 9px 17px; font-weight: 700; font-size: 12.5px; font-family: var(--sans); transition: .18s; }
  .fxmore:hover { background: rgba(242,205,92,.12); border-color: var(--gold); }

  /* movers + results */
  .mover { display: flex; align-items: center; gap: 9px; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: 13.5px; }
  .mover:last-child { border-bottom: 0; }
  .mover .flag { width: 22px; height: 15px; border-radius: 2px; object-fit: cover; background:#222; box-shadow: 0 0 0 1px rgba(0,0,0,.4); }
  .mover .nm { font-weight: 600; } .mover .d { margin-left: auto; font-family: var(--mono); font-weight: 700; font-size: 12.5px; }
  .mover .d.up { color: var(--up); } .mover .d.down { color: var(--down); }
  .mover .gp { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .result { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
  .result:last-child { border-bottom: 0; }
  .result .rs { display: flex; align-items: center; gap: 6px; min-width: 0; } .result .rs.a { justify-content: flex-end; text-align: right; }
  .result .rs .flag { width: 20px; height: 13px; border-radius: 2px; object-fit: cover; background:#222; box-shadow: 0 0 0 1px rgba(0,0,0,.4); flex: none; }
  .result .rs .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result .sc { font-family: var(--mono); font-weight: 800; font-size: 14px; }
  .result .win { font-weight: 700; } .result .meta { font-family: var(--mono); font-size: 9px; color: var(--muted); text-align: center; }

  .method { margin-top: 18px; padding: 14px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel); font-size: 12px; color: var(--muted); line-height: 1.65; }
  .method b { color: var(--ink); } .method .em { color: var(--sim); font-weight: 600; }
  .method code { font-family: var(--mono); font-size: 11px; color: var(--ink); }
  .method a { color: var(--sim); text-decoration: none; } .method a:hover { text-decoration: underline; }

  /* ---- tablet / desktop ---- */
  @media (min-width: 760px) {
    .wrap { padding: 26px 26px 110px; }
    h1 { font-size: 26px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
    .span2 { grid-column: 1 / -1; }
    .fixtures { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  }
  @media (min-width: 1040px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; }
    .fixtures { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="backlink" href="index.html" id="backlink">← Pre-tournament forecast &amp; Journey Tree</a>
  <header>
    <div class="titlerow">
      <div>
        <h1><span class="live-dot"></span> <span id="h1">Live Re-Forecast</span></h1>
        <div class="tagline" id="tagline"></div>
      </div>
      <div class="langtoggle" id="langToggle" role="group" aria-label="Language">
        <button type="button" data-lang="en">EN</button><button type="button" data-lang="es">ES</button>
      </div>
    </div>
    <div class="stamp" id="stamp"></div>
  </header>

  <div class="grid">
    <div class="panel">
      <h2 id="titleHead">Title odds — live</h2>
      <p class="sub" id="titleSub"></p>
      <div id="titleOdds"></div>
    </div>
    <div class="panel">
      <h2 id="advHead">To reach the knockouts</h2>
      <p class="sub" id="advSub"></p>
      <div id="advOdds"></div>
    </div>
    <div class="panel">
      <h2 id="moversHead">Rating movers</h2>
      <p class="sub" id="moversSub"></p>
      <div id="movers"></div>
    </div>

    <div class="panel span2" style="grid-column:1/-1">
      <h2 id="nextHead">Next matches — model prediction</h2>
      <p class="sub" id="nextSub"></p>
      <div id="fixtures"></div>
    </div>

    <div class="panel span2" style="grid-column:1/-1">
      <h2 id="resHead">Results so far</h2>
      <p class="sub" id="resSub"></p>
      <div id="results"></div>
    </div>
  </div>

  <div class="method" id="method"></div>
</div>

<script>
const L = window.WC_LIVE;
const FLAG = c => `https://flagcdn.com/w320/${c}.png`;
let LANG = (new URLSearchParams(location.search).get("lang") || localStorage.getItem("wc_lang") || "en").toLowerCase();
if (LANG !== "es") LANG = "en";
document.documentElement.lang = LANG;

const TEAM_ES = (L.meta && L.meta.teamNamesEs) || {};
const teamName = n => (LANG === "es" && TEAM_ES[n]) ? TEAM_ES[n] : n;

const ROUND = {
  en: { group:"Group stage", R32:"Round of 32", R16:"Round of 16", QF:"Quarter-final", SF:"Semi-final", "3rd_place":"Third place", final:"Final" },
  es: { group:"Fase de grupos", R32:"Dieciseisavos", R16:"Octavos", QF:"Cuartos", SF:"Semifinal", "3rd_place":"Tercer puesto", final:"Final" },
};
const I18N = {
  en: {
    back:"← Pre-tournament forecast & Journey Tree",
    h1:"Live Re-Forecast",
    tagline:"The same honest Monte Carlo, now <b style='color:var(--sim)'>conditioned on real results</b>. Finished matches are locked to their real score; ratings move on the pitch; the rest is re-simulated.",
    asOf:"AS OF", games:"group games played", fetched:"data", source:"source",
    titleHead:"Title odds — live", titleSub:"World-champion probability across {sims} conditional simulations · Δ vs the frozen pre-tournament forecast.",
    advHead:"To reach the knockouts", advSub:"P(escape the group → Round of 32) · Δ vs the frozen forecast. Top movers shown.",
    moversHead:"Rating movers", moversSub:"Biggest FIFA-points swings, earned on the pitch — {rule}",
    nextHead:"Next matches — model prediction", nextSub:"Closed-form from the same Poisson model on the updated ratings. Win / draw / loss + most-likely scoreline. No separate model, no hand-tuning.",
    resHead:"Results so far", resSub:"The real, finished matches clamped into the simulation ({n} of {tot} group games).",
    win:"W", draw:"D", loss:"L", likely:"likely", adv:"adv.",
    nextUp:"NEXT UP", noNext:"No upcoming fixtures with both teams decided yet — they appear once the groups resolve.",
    fxMatches:"matches", showAll:"Show all {n} remaining fixtures  ▾", showLess:"Show next matchday only  ▴",
    deltaFlat:"—",
    methodTitle:"How this stays honest.",
    method:"This is a <b>conditional</b> re-run of the exact pre-tournament engine — not a new model. Every finished match is <span class='em'>clamped</span> to its real scoreline (the sim reproduces it and draws no randomness for it) and only the unknown remainder is re-simulated. Team ratings are updated on the pitch by <b>FIFA's own SUM formula</b> (<code>P' = P + I·(W − We)</code>, divisor 600), so a result both fixes the past and shifts the projection for what's left. At zero games played this reproduces the frozen forecast <b>exactly</b> (verified). Neutral venue — no host advantage. Field rank is 1–48 within this field.",
    methodFoot:"{sims} simulations · seed {seed} · ratings: {rs} ({rsnap}) · source: ",
  },
  es: {
    back:"← Pronóstico pre-torneo y Árbol del Camino",
    h1:"Pronóstico en Vivo",
    tagline:"El mismo Monte Carlo honesto, ahora <b style='color:var(--sim)'>condicionado a los resultados reales</b>. Los partidos jugados quedan fijados a su marcador; las valoraciones cambian en el campo; el resto se vuelve a simular.",
    asOf:"AL", games:"partidos de grupo jugados", fetched:"datos", source:"fuente",
    titleHead:"Probabilidad de título — en vivo", titleSub:"Probabilidad de ser campeón en {sims} simulaciones condicionales · Δ frente al pronóstico congelado pre-torneo.",
    advHead:"Avanzar a eliminatorias", advSub:"P(superar el grupo → Dieciseisavos) · Δ frente al pronóstico congelado. Mayores cambios.",
    moversHead:"Cambios de valoración", moversSub:"Mayores variaciones de puntos FIFA, ganadas en el campo — {rule}",
    nextHead:"Próximos partidos — predicción del modelo", nextSub:"Forma cerrada del mismo modelo de Poisson sobre las valoraciones actualizadas. Victoria / empate / derrota + marcador más probable. Sin modelo aparte, sin ajustes manuales.",
    resHead:"Resultados hasta ahora", resSub:"Los partidos reales ya jugados, fijados en la simulación ({n} de {tot} de grupos).",
    win:"V", draw:"E", loss:"D", likely:"probable", adv:"avanza",
    nextUp:"PRÓXIMO", noNext:"Aún no hay próximos partidos con ambos rivales definidos — aparecerán cuando se resuelvan los grupos.",
    fxMatches:"partidos", showAll:"Ver los {n} partidos restantes  ▾", showLess:"Solo la próxima jornada  ▴",
    deltaFlat:"—",
    methodTitle:"Cómo se mantiene honesto.",
    method:"Esto es una nueva corrida <b>condicional</b> del mismo motor pre-torneo — no un modelo nuevo. Cada partido jugado se <span class='em'>fija</span> a su marcador real (la simulación lo reproduce y no usa azar para él) y solo se vuelve a simular lo desconocido. Las valoraciones se actualizan en el campo con <b>la propia fórmula SUM de la FIFA</b> (<code>P' = P + I·(W − We)</code>, divisor 600), así un resultado fija el pasado y ajusta la proyección de lo que falta. Con cero partidos jugados esto reproduce el pronóstico congelado <b>exactamente</b> (verificado). Sede neutral — sin ventaja local. El puesto es ranking de campo (1–48) dentro de este grupo.",
    methodFoot:"{sims} simulaciones · semilla {seed} · valoraciones: {rs} ({rsnap}) · fuente: ",
  },
};
const t = (k, p) => { let s = (I18N[LANG] && I18N[LANG][k] != null) ? I18N[LANG][k] : (I18N.en[k] || k); if (p) for (const key in p) s = s.split("{" + key + "}").join(p[key]); return s; };
const rd = code => (ROUND[LANG][code] || code);
const r1 = x => (Math.round(x * 10) / 10).toFixed(1);
const pc = x => Math.round(x); // 0-1 -> %
const fmtDate = iso => { if (!iso) return ""; const [y,m,d] = iso.split("-").map(Number); return new Date(Date.UTC(y, m-1, d)).toLocaleDateString(LANG === "es" ? "es-ES" : "en-US", { month:"short", day:"numeric", timeZone:"UTC" }); };
const fmtDay = iso => { if (!iso) return ""; const [y,m,d] = iso.split("-").map(Number); return new Date(Date.UTC(y, m-1, d)).toLocaleDateString(LANG === "es" ? "es-ES" : "en-US", { weekday:"short", month:"short", day:"numeric", timeZone:"UTC" }); };
let fxExpanded = false; // "Next matches" shows the next matchday by default; toggle reveals the rest

// signed delta chip (input is percentage points)
function deltaChip(d) {
  if (Math.abs(d) < 0.05) return `<span class="delta flat">${t('deltaFlat')}</span>`;
  const cls = d > 0 ? "up" : "down", arrow = d > 0 ? "▲" : "▼";
  return `<span class="delta ${cls}">${arrow} ${d > 0 ? "+" : "−"}${r1(Math.abs(d))}</span>`;
}

function render() {
  const m = L.meta;
  document.querySelectorAll("#langToggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === LANG));
  document.getElementById("backlink").href = "index.html" + (LANG === "es" ? "?lang=es" : "");
  document.getElementById("backlink").textContent = t('back');
  document.getElementById("h1").textContent = t('h1');
  document.getElementById("tagline").innerHTML = t('tagline');
  const simsTxt = (m.sims || 0).toLocaleString(LANG === "es" ? "es-ES" : "en-US");

  // as-of stamp
  document.getElementById("stamp").innerHTML =
    `<span>${t('asOf')} <b>${fmtDate(m.asOfDate)}</b></span>` +
    `<span><b>${m.groupPlayedCount}</b>/${m.groupTotal} ${t('games')}</span>` +
    `<span class="prog"><i style="width:${(100*m.groupPlayedCount/m.groupTotal).toFixed(1)}%"></i></span>` +
    `<span>${t('source')}: <a href="${m.sourceUrl}" target="_blank" rel="noopener">openfootball</a></span>`;

  // ---- title odds (top 12) ----
  const champs = L.champions.slice(0, 12);
  const maxPct = champs[0] ? champs[0].pct : 1;
  document.getElementById("titleHead").textContent = t('titleHead');
  document.getElementById("titleSub").textContent = t('titleSub', { sims: simsTxt });
  document.getElementById("titleOdds").innerHTML = champs.map(c => `
    <div class="oddsrow">
      <img class="flag" src="${FLAG(c.code)}" alt="">
      <div style="min-width:0">
        <div class="nm">${teamName(c.name)}<span class="rk">#${c.fieldRank}</span></div>
        <div class="bar"><i style="width:${(100*c.pct/maxPct).toFixed(1)}%"></i></div>
      </div>
      <div><span class="val">${r1(c.pct)}%</span>${deltaChip(c.delta)}</div>
    </div>`).join("");

  // ---- advancement: sort by |advanceDelta|, show top 12 movers ----
  const adv = [...L.reach].sort((a,b) => Math.abs(b.advanceDelta) - Math.abs(a.advanceDelta)).slice(0, 12);
  document.getElementById("advHead").textContent = t('advHead');
  document.getElementById("advSub").textContent = t('advSub');
  document.getElementById("advOdds").innerHTML = adv.map(c => `
    <div class="oddsrow">
      <img class="flag" src="${FLAG(c.code)}" alt="">
      <div style="min-width:0">
        <div class="nm">${teamName(c.name)}<span class="rk">#${c.fieldRank}</span></div>
        <div class="bar"><i style="width:${c.advancePct.toFixed(1)}%"></i></div>
      </div>
      <div><span class="val">${r1(c.advancePct)}%</span>${deltaChip(c.advanceDelta)}</div>
    </div>`).join("");

  // ---- rating movers ----
  document.getElementById("moversHead").textContent = t('moversHead');
  document.getElementById("moversSub").textContent = t('moversSub', { rule: m.eloRule });
  document.getElementById("movers").innerHTML = (L.movers || []).slice(0, 10).map(mv => {
    const up = mv.delta >= 0;
    return `<div class="mover">
      <img class="flag" src="${FLAG(mv.code)}" alt="">
      <span class="nm">${teamName(mv.name)}</span>
      <span class="gp">${mv.played}g</span>
      <span class="d ${up ? "up" : "down"}">${up ? "+" : "−"}${Math.round(Math.abs(mv.delta))}</span>
    </div>`;
  }).join("");

  // ---- next matches: grouped by date, next matchday shown by default, rest behind a toggle ----
  document.getElementById("nextHead").textContent = t('nextHead');
  document.getElementById("nextSub").textContent = t('nextSub');
  const fxRoot = document.getElementById("fixtures");
  const proj = L.projections || [];
  // projections are date-sorted; collapse into one group per matchday
  const fxGroups = [];
  for (const p of proj) {
    const g = fxGroups[fxGroups.length - 1];
    if (g && g.date === p.date) g.list.push(p); else fxGroups.push({ date: p.date, list: [p] });
  }
  const fxCard = p => {
    const h = pc(p.pHome*100), d = pc(p.pDraw*100), a = pc(p.pAway*100);
    return `<div class="fx ${p.date === L.nextDate ? "next" : ""}">
      <div class="fxhead"><span class="grp">${p.group ? "Group " + p.group : rd(p.round)}</span></div>
      <div class="teams">
        <div class="side home"><img class="flag" src="${FLAG(p.homeCode)}" alt=""><span class="nm">${teamName(p.home)}</span></div>
        <div class="score">${p.likely.home}–${p.likely.away}<small>${t('likely')}</small></div>
        <div class="side away"><span class="nm">${teamName(p.away)}</span><img class="flag" src="${FLAG(p.awayCode)}" alt=""></div>
      </div>
      <div class="wdl">
        <div class="track"><span class="seg-h" style="width:${h}%"></span><span class="seg-d" style="width:${d}%"></span><span class="seg-a" style="width:${a}%"></span></div>
        <div class="labels"><span><b>${h}%</b> ${t('win')}</span><span>${d}% ${t('draw')}</span><span><b>${a}%</b> ${t('win')}</span></div>
      </div>
    </div>`;
  };
  function renderFixtures() {
    if (!proj.length) { fxRoot.innerHTML = `<p class="sub">${t('noNext')}</p>`; return; }
    const shown = fxExpanded ? fxGroups : fxGroups.slice(0, 1);
    const remaining = proj.length - shown.reduce((n, g) => n + g.list.length, 0);
    fxRoot.innerHTML = shown.map((g, gi) => `
      <div class="fxgroup">
        <div class="fxday">
          ${gi === 0 && g.date === L.nextDate ? `<span class="daytag">★ ${t('nextUp')}</span>` : ""}
          <span class="d">${fmtDay(g.date)}</span>
          <span class="cnt">${g.list.length} ${t('fxMatches')}</span>
        </div>
        <div class="fixtures">${g.list.map(fxCard).join("")}</div>
      </div>`).join("") +
      (fxGroups.length > 1
        ? `<button class="fxmore" id="fxToggle">${fxExpanded ? t('showLess') : t('showAll', { n: remaining })}</button>`
        : "");
    const tog = document.getElementById("fxToggle");
    if (tog) tog.onclick = () => { fxExpanded = !fxExpanded; renderFixtures(); };
  }
  renderFixtures();

  // ---- results so far ----
  document.getElementById("resHead").textContent = t('resHead');
  document.getElementById("resSub").textContent = t('resSub', { n: m.groupPlayedCount, tot: m.groupTotal });
  const res = [...(L.results || [])].reverse(); // most recent first
  document.getElementById("results").innerHTML = res.map(r => {
    const hw = r.winner === r.home, aw = r.winner === r.away;
    const tag = r.decidedBy && r.decidedBy !== "REG" ? (r.decidedBy === "PENS" ? "pens" : "a.e.t.") : "";
    return `<div class="result">
      <div class="rs h"><img class="flag" src="${FLAG((L.reach.find(x=>x.name===r.home)||{}).code)}" alt=""><span class="nm ${hw?"win":""}">${teamName(r.home)}</span></div>
      <div style="text-align:center"><span class="sc">${r.homeGoals}–${r.awayGoals}</span><div class="meta">${fmtDate(r.date)}${tag?" · "+tag:""}</div></div>
      <div class="rs a"><span class="nm ${aw?"win":""}">${teamName(r.away)}</span><img class="flag" src="${FLAG((L.reach.find(x=>x.name===r.away)||{}).code)}" alt=""></div>
    </div>`;
  }).join("");

  // ---- method ----
  document.getElementById("method").innerHTML =
    `<b>${t('methodTitle')}</b> ${t('method')}<br><br>` +
    `<span style="font-family:var(--mono);font-size:11px">${t('methodFoot', { sims: simsTxt, seed: m.masterSeed, rs: m.ratingSource, rsnap: m.ratingSnapshot })}<a href="${m.sourceUrl}" target="_blank" rel="noopener">${m.source}</a></span>`;
}

document.querySelectorAll("#langToggle button").forEach(b => b.onclick = () => {
  if (b.dataset.lang === LANG) return;
  LANG = b.dataset.lang; localStorage.setItem("wc_lang", LANG); document.documentElement.lang = LANG;
  render();
});
render();
</script>
</body>
</html>
