<style>
  /* ---- MOBILE-FIRST: base styles target a phone; min-width queries widen later. ---- */
  :root {
    --bg: #08120e; --ink: #e9f1ea; --muted: #82998c;
    --line: rgba(233, 241, 234, 0.10); --panel: rgba(233, 241, 234, 0.035);
    --gold: #f2cd5c; --gold-dim: #b8932f; --sim: #44c4ac; --ai: #b794f6;
    --up: #51d1a4; --down: #ff7a5c; --draw: #8aa0b4; --loss: #5d7268;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(1100px 700px at 50% -16%, #1a4632 0%, transparent 60%),
      radial-gradient(900px 640px at 50% 124%, #0c2316 0%, transparent 56%),
      #08160f;
    color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; line-height: 1.5;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 50% 50%, transparent 88px, rgba(233,241,234,.14) 89px, rgba(233,241,234,.14) 91px, transparent 92px),
      repeating-linear-gradient(0deg, rgba(180,235,200,.06) 0 7%, rgba(0,0,0,0) 7% 14%);
    mask: linear-gradient(180deg, transparent, #000 8%, #000 92%, transparent);
  }
  .wrap { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 16px 14px 90px; }

  /* ---- header ---- */
  .toplinks { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .backlink { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12.5px; text-decoration: none; font-weight: 600; }
  .backlink:hover { color: var(--ink); }
  #accLink:hover { color: var(--ai); }
  header { display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 14px; }
  .titlerow { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  h1 { font-size: 21px; font-weight: 800; letter-spacing: -0.01em; margin: 0; } h1 .ball { color: var(--gold); }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--up); box-shadow: 0 0 0 0 rgba(81,209,164,.6); animation: pulse 2s infinite; margin-right: 2px; vertical-align: middle; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(81,209,164,.5);} 70%{ box-shadow: 0 0 0 7px rgba(81,209,164,0);} 100%{ box-shadow:0 0 0 0 rgba(81,209,164,0);} }
  .tagline { color: var(--muted); font-size: 13px; }
  .langtoggle { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; flex: none; }
  .langtoggle button { border: 0; background: transparent; color: var(--muted); font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .08em; padding: 6px 11px; cursor: pointer; transition: .15s; }
  .langtoggle button.active { background: var(--sim); color: #06231c; }

  /* as-of stamp */
  .stamp { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px; margin-top: 6px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .stamp b { color: var(--ink); font-weight: 700; }
  .stamp .prog { flex: 1 1 140px; min-width: 130px; height: 6px; border-radius: 999px; background: var(--panel); overflow: hidden; border: 1px solid var(--line); }
  .stamp .prog > i { display: block; height: 100%; background: linear-gradient(90deg, var(--sim), var(--gold)); }
  .stamp a { color: var(--sim); text-decoration: none; } .stamp a:hover { text-decoration: underline; }

  /* ---- panels ---- */
  .grid { display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 15px 14px; }
  .panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin: 0 0 4px; font-weight: 700; }
  .panel .sub { color: var(--muted); font-size: 11.5px; margin: 0 0 12px; }

  /* odds rows (title race / advancement) */
  .oddsrow { display: grid; grid-template-columns: 22px 1fr auto; align-items: center; gap: 9px; padding: 7px 0; border-bottom: 1px dashed var(--line); }
  .oddsrow:last-child { border-bottom: 0; }
  .oddsrow .flag { width: 22px; height: 15px; border-radius: 2px; object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,.4); background: #222; }
  .oddsrow .nm { font-size: 13.5px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .oddsrow .nm .rk { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: 5px; }
  .oddsrow .bar { grid-column: 2 / 3; height: 5px; border-radius: 999px; background: rgba(255,255,255,.06); margin-top: 4px; overflow: hidden; }
  .oddsrow .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
  .oddsrow .val { text-align: right; font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .delta { font-family: var(--mono); font-size: 10.5px; font-weight: 700; display: block; margin-top: 2px; }
  .delta.up { color: var(--up); } .delta.down { color: var(--down); } .delta.flat { color: var(--muted); }

  /* next-match cards */
  .fixtures { display: flex; flex-direction: column; gap: 11px; }
  .fx { border: 1px solid var(--line); border-radius: 12px; padding: 12px 13px; background: linear-gradient(180deg, rgba(68,196,172,.05), transparent 60%); }
  .fx.next { border-color: var(--gold-dim); box-shadow: 0 0 18px rgba(242,205,92,.10); }
  .fx .fxhead { display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .06em; margin-bottom: 9px; }
  .fx .fxhead .grp { color: var(--sim); }
  .fx .fxhead .ko { color: var(--ink); font-weight: 700; } .fx .fxhead .ko .tz { color: var(--muted); font-weight: 400; margin-left: 3px; }
  .fx .teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .fx .side { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .fx .side.away { justify-content: flex-end; text-align: right; }
  .fx .side .flag { width: 24px; height: 16px; border-radius: 2px; object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,.4); background:#222; flex: none; }
  .fx .side .nm { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fx .score { font-family: var(--mono); font-weight: 800; font-size: 17px; text-align: center; letter-spacing: 1px; }
  .fx .score small { display: block; font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: .08em; }
  .wdl { margin-top: 11px; }
  .wdl .track { display: flex; height: 8px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.05); }
  .wdl .track > span { display: block; height: 100%; }
  .wdl .seg-h { background: var(--sim); } .wdl .seg-d { background: var(--draw); } .wdl .seg-a { background: var(--gold-dim); }
  .wdl .labels { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10.5px; margin-top: 5px; color: var(--muted); }
  .wdl .labels b { color: var(--ink); }
  /* date-grouped fixtures + show-more */
  .fxgroup + .fxgroup { margin-top: 18px; }
  .fxday { display: flex; align-items: baseline; flex-wrap: wrap; gap: 9px; margin: 0 0 11px; padding-bottom: 7px; border-bottom: 1px solid var(--line); }
  .fxday .d { font-family: var(--mono); font-size: 12.5px; font-weight: 700; color: var(--ink); letter-spacing: .03em; }
  .fxday .cnt { font-family: var(--mono); font-size: 10.5px; color: var(--muted); }
  .fxday .daytag { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .1em; color: #06231c; background: var(--gold); border-radius: 999px; padding: 2px 8px; }
  .fxmore { margin-top: 16px; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; background: var(--panel); border: 1px solid var(--gold-dim); color: var(--gold); border-radius: 999px; padding: 9px 17px; font-weight: 700; font-size: 12.5px; font-family: var(--sans); transition: .18s; }
  .fxmore:hover { background: rgba(242,205,92,.12); border-color: var(--gold); }
  /* "what needs to happen" — per-team conditional advancement inside a fixture card */
  .adv { margin-top: 11px; padding-top: 10px; border-top: 1px dashed var(--line); }
  .adv .lbl { font-family: var(--mono); font-size: 9px; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .advrow { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 11.5px; }
  .advrow .t { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  .advrow .seg { font-family: var(--mono); font-size: 10.5px; font-weight: 700; border-radius: 5px; padding: 1px 6px; flex: none; }
  .advrow .seg.w { color: #06231c; background: var(--sim); } .advrow .seg.d { color: var(--ink); background: rgba(255,255,255,.08); } .advrow .seg.l { color: var(--ink); background: rgba(255,122,92,.18); }
  .advrow .done { font-family: var(--mono); font-size: 10.5px; font-weight: 700; flex: none; }
  .advrow .done.through { color: var(--up); } .advrow .done.out { color: var(--down); }

  /* ---- knockout bracket (tie cards) ---- */
  .bracketgrid { display: flex; flex-direction: column; gap: 11px; }
  .tie { border: 1px solid var(--line); border-radius: 12px; padding: 12px 13px; background: linear-gradient(180deg, rgba(68,196,172,.05), transparent 60%); }
  .tie.next { border-color: var(--gold-dim); box-shadow: 0 0 18px rgba(242,205,92,.10); }
  .tie.done { background: rgba(255,255,255,.02); }
  .tie .tiehead { display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .06em; margin-bottom: 8px; gap: 8px; }
  .tie .tiehead .rnd { color: var(--sim); font-weight: 700; flex: none; }
  .tie .tiehead .ko { text-align: right; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; } .tie .tiehead .ko .tz { color: var(--muted); }
  .tie .tiehead .star { color: var(--gold); }
  .tie .row { display: flex; align-items: center; gap: 8px; padding: 3px 0; min-width: 0; }
  .tie .row .flag { width: 24px; height: 16px; border-radius: 2px; object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,.4); background: #222; flex: none; }
  .tie .row .nm { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1 1 auto; min-width: 0; }
  .tie .row .nm .rk { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: 5px; font-weight: 400; }
  .tie .row .adv { font-family: var(--mono); font-size: 12.5px; font-weight: 700; color: var(--muted); flex: none; min-width: 36px; text-align: right; }
  .tie .row .sc { font-family: var(--mono); font-size: 16px; font-weight: 800; flex: none; min-width: 16px; text-align: right; }
  .tie .row .ck { color: var(--up); font-weight: 700; flex: none; }
  .tie .row.fav .nm { color: var(--ink); } .tie .row.fav .adv { color: var(--gold); }
  .tie .row.lose .nm { color: var(--muted); } .tie .row.lose .flag { opacity: .6; }
  .tie .abar { display: flex; height: 7px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.05); margin: 8px 0 6px; }
  .tie .abar > span { display: block; height: 100%; }
  .tie .abar .ah { background: var(--sim); } .tie .abar .aa { background: var(--gold-dim); }
  .tie .foot { font-family: var(--mono); font-size: 10.5px; color: var(--muted); }
  .tie .foot b { color: var(--ink); }
  .tie .foot .ml { font-size: 13.5px; font-weight: 800; color: var(--ink); margin-right: 5px; letter-spacing: .5px; }
  /* projected (not-yet-played) ties — dashed to signal "model projection, not a real draw" */
  .tie.proj { border-style: dashed; background: rgba(255,255,255,.012); }
  .tie.proj .tiehead .rnd { color: var(--muted); }
  .tie.proj .tiehead .ko { color: var(--ai); }
  .tie.proj .row .adv { color: var(--muted); }
  /* round sections (R32 → Final) */
  .roundsection + .roundsection { margin-top: 20px; }
  .roundhead { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--ink); margin: 0 0 11px; padding-bottom: 6px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .roundhead .ptag { color: var(--ai); font-size: 9px; font-weight: 700; letter-spacing: .08em; }
  .roundhead .cnt { color: var(--muted); font-size: 9.5px; font-weight: 400; letter-spacing: .04em; }

  /* group standings */
  .groups { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .grp-card { border: 1px solid var(--line); border-radius: 12px; padding: 11px 12px; background: rgba(255,255,255,.02); }
  .grp-card h3 { margin: 0 0 8px; font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; color: var(--sim); text-transform: uppercase; }
  .stbl { width: 100%; border-collapse: collapse; }
  .stbl th { font-family: var(--mono); font-size: 8.5px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; text-align: right; padding: 0 0 6px; }
  .stbl th.l { text-align: left; }
  .stbl td { padding: 5px 0; border-top: 1px solid var(--line); text-align: right; font-family: var(--mono); font-size: 12px; }
  .stbl td.team { text-align: left; font-family: var(--sans); font-size: 13px; }
  .stbl td.team .tin { display: flex; align-items: center; gap: 6px; }
  .stbl td.team .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; background: var(--loss); }
  .stbl td.team .dot.through { background: var(--up); } .stbl td.team .dot.out { background: var(--down); } .stbl td.team .dot.third { background: var(--gold); }
  .stbl td.team .flag { width: 19px; height: 13px; border-radius: 2px; object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,.4); background: #222; flex: none; }
  .stbl td.team .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stbl td.team .ck { color: var(--up); font-weight: 700; flex: none; }
  .stbl td.pts { color: var(--gold); font-weight: 700; }
  .stbl td.adv { color: var(--ink); }
  .stbl tr.out td { opacity: .55; }
  .glegend { font-family: var(--mono); font-size: 11px; color: var(--muted); margin: 2px 0 14px; display: flex; flex-wrap: wrap; gap: 7px 16px; padding: 9px 13px; border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.025); }
  .glegend .k { display: inline-flex; align-items: center; gap: 6px; } .glegend .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex: none; }
  .glegend .through { background: var(--up); } .glegend .third { background: var(--gold); } .glegend .out { background: var(--down); } .glegend .live { background: var(--loss); }
  .standtoggle { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; margin: 0 0 13px; }
  .standtoggle button { border: 0; background: transparent; color: var(--muted); font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .05em; padding: 6px 15px; cursor: pointer; transition: .15s; }
  .standtoggle button.active { background: var(--sim); color: #06231c; }
  .standtoggle button:not(.active):hover { color: var(--ink); }
  .stbl td.num { text-align: left; white-space: nowrap; } .stbl .ar { font-size: 9px; margin-left: 1px; }
  .stbl .ar.up { color: var(--up); } .stbl .ar.dn { color: var(--down); } .stbl .ar.fl { color: var(--muted); }

  /* movers + results */
  .mover { display: flex; align-items: center; gap: 9px; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: 13.5px; }
  .mover:last-child { border-bottom: 0; }
  .mover .flag { width: 22px; height: 15px; border-radius: 2px; object-fit: cover; background:#222; box-shadow: 0 0 0 1px rgba(0,0,0,.4); }
  .mover .nm { font-weight: 600; } .mover .d { margin-left: auto; font-family: var(--mono); font-weight: 700; font-size: 12.5px; }
  .mover .d.up { color: var(--up); } .mover .d.down { color: var(--down); }
  .mover .gp { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .result { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
  .result:last-child { border-bottom: 0; }
  .result .rs { display: flex; align-items: center; gap: 6px; min-width: 0; } .result .rs.a { justify-content: flex-end; text-align: right; }
  .result .rs .flag { width: 20px; height: 13px; border-radius: 2px; object-fit: cover; background:#222; box-shadow: 0 0 0 1px rgba(0,0,0,.4); flex: none; }
  .result .rs .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result .sc { font-family: var(--mono); font-weight: 800; font-size: 14px; }
  .result .win { font-weight: 700; } .result .meta { font-family: var(--mono); font-size: 9px; color: var(--muted); text-align: center; }
  .result .scorers { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: -2px; }
  .result .scorers .gh { text-align: right; } .result .scorers .ga { text-align: left; }
  .result .scorers .g { font-size: 10.5px; color: var(--muted); line-height: 1.5; }
  .result .scorers .g .mn { font-family: var(--mono); font-size: 9px; opacity: .8; margin-left: 3px; }
  .result .scorers .g .mk { font-style: italic; opacity: .7; }

  .method { margin-top: 18px; padding: 14px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel); font-size: 12px; color: var(--muted); line-height: 1.65; }
  .method b { color: var(--ink); } .method .em { color: var(--sim); font-weight: 600; }
  .method code { font-family: var(--mono); font-size: 11px; color: var(--ink); }
  .method a { color: var(--sim); text-decoration: none; } .method a:hover { text-decoration: underline; }

  /* ---- tablet / desktop ---- */
  @media (min-width: 760px) {
    .wrap { padding: 26px 26px 110px; }
    h1 { font-size: 26px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
    .span2 { grid-column: 1 / -1; }
    .fixtures { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .groups { grid-template-columns: 1fr 1fr; }
    .bracketgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  }
  @media (min-width: 1040px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; }
    .fixtures { grid-template-columns: 1fr 1fr 1fr; }
    .groups { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>

<body>
<div class="wrap">
  <div class="toplinks">
    <a class="backlink" href="index.html" id="backlink">← Pre-tournament forecast &amp; Journey Tree</a>
    <a class="backlink" href="accuracy.html" id="accLink">◷ Model accuracy →</a>
  </div>
  <header>
    <div class="titlerow">
      <div>
        <h1><span class="live-dot"></span> <span id="h1">Live Re-Forecast</span></h1>
        <div class="tagline" id="tagline"></div>
      </div>
      <div class="langtoggle" id="langToggle" role="group" aria-label="Language">
        <button type="button" data-lang="en">EN</button><button type="button" data-lang="es">ES</button>
      </div>
    </div>
    <div class="stamp" id="stamp"></div>
  </header>

  <div class="grid">
    <div class="panel">
      <h2 id="titleHead">Title odds — live</h2>
      <p class="sub" id="titleSub"></p>
      <div id="titleOdds"></div>
    </div>
    <div class="panel">
      <h2 id="advHead">To reach the knockouts</h2>
      <p class="sub" id="advSub"></p>
      <div id="advOdds"></div>
    </div>
    <div class="panel">
      <h2 id="moversHead">Rating movers</h2>
      <p class="sub" id="moversSub"></p>
      <div id="movers"></div>
    </div>

    <div class="panel span2" id="panelStandings" style="grid-column:1/-1">
      <h2 id="standHead">Group standings — live</h2>
      <p class="sub" id="standSub"></p>
      <div class="standtoggle" id="standToggle" role="group" aria-label="Standings view">
        <button type="button" data-view="now">Now</button><button type="button" data-view="proj">Projected</button>
      </div>
      <div class="glegend" id="glegend"></div>
      <div class="groups" id="groups"></div>
    </div>

    <div class="panel span2" id="panelBracket" style="grid-column:1/-1">
      <h2 id="nextHead">Next matches — model prediction</h2>
      <p class="sub" id="nextSub"></p>
      <div id="fixtures"></div>
    </div>

    <div class="panel span2" style="grid-column:1/-1">
      <h2 id="resHead">Results so far</h2>
      <p class="sub" id="resSub"></p>
      <div id="results"></div>
    </div>
  </div>

  <div class="method" id="method"></div>
</div>

<script>
const L = window.WC_LIVE;
const FLAG = c => `https://flagcdn.com/w320/${c}.png`;
let LANG = (new URLSearchParams(location.search).get("lang") || localStorage.getItem("wc_lang") || "en").toLowerCase();
if (LANG !== "es") LANG = "en";
document.documentElement.lang = LANG;

const TEAM_ES = (L.meta && L.meta.teamNamesEs) || {};
const teamName = n => (LANG === "es" && TEAM_ES[n]) ? TEAM_ES[n] : n;

const ROUND = {
  en: { group:"Group stage", R32:"Round of 32", R16:"Round of 16", QF:"Quarter-final", SF:"Semi-final", "3rd_place":"Third place", final:"Final" },
  es: { group:"Fase de grupos", R32:"Dieciseisavos", R16:"Octavos", QF:"Cuartos", SF:"Semifinal", "3rd_place":"Tercer puesto", final:"Final" },
};
const I18N = {
  en: {
    back:"← Pre-tournament forecast & Journey Tree", accLink:"◷ Model accuracy →",
    h1:"Live Re-Forecast",
    tagline:"The same honest Monte Carlo, now <b style='color:var(--sim)'>conditioned on real results</b>. Finished matches are locked to their real score; ratings move on the pitch; the rest is re-simulated.",
    asOf:"AS OF", games:"group games played", fetched:"data", source:"source",
    titleHead:"Title odds — live", titleSub:"World-champion probability across {sims} conditional simulations · Δ vs the frozen pre-tournament forecast.",
    advHead:"To reach the knockouts", advSub:"P(escape the group → Round of 32) · Δ vs the frozen forecast. Top movers shown.",
    moversHead:"Rating movers", moversSub:"Biggest FIFA-points swings, earned on the pitch — {rule}",
    nextHead:"Next matches — model prediction", nextSub:"Closed-form from the same Poisson model on the updated ratings. Win / draw / loss + most-likely scoreline. No separate model, no hand-tuning.",
    resHead:"Results so far", resSub:"The real, finished matches clamped into the simulation ({n} of {tot} group games).",
    pen:"pen", og:"o.g.",
    win:"W", draw:"D", loss:"L", likely:"likely", adv:"adv.",
    nextUp:"NEXT UP", noNext:"No upcoming fixtures with both teams decided yet — they appear once the groups resolve.",
    fxMatches:"matches", showAll:"Show all {n} remaining fixtures  ▾", showLess:"Show next matchday only  ▴", grp:"Group",
    standHead:"Group standings — live", standSub:"Live tables from the real results; the last column is the model's chance to reach the Round of 32.",
    standSubProj:"The model's expected FINAL order — ▲/▼ shows the move vs the current table. (Points shown are still today's.)",
    vNow:"Now", vProj:"Projected", cProj:"Proj",
    cPld:"Pl", cGD:"GD", cPts:"Pts", cAdv:"R32",
    legThrough:"clinched top 2", legThird:"3rd-place path", legOut:"out", legLive:"in contention",
    advIf:"Reach the Round of 32 if…", advThrough:"✓ through", advOut:"✗ out",
    deltaFlat:"—",
    phaseKo:"● KNOCKOUTS", matches:"matches played",
    deepHead:"Deep-run odds", deepSub:"Model probability of reaching the FINAL · {sims} conditional sims.",
    bracketHead:"Knockout bracket", bracketSub:"Win or go home. For decided ties: each side's chance to ADVANCE (incl. extra time &amp; penalties) + the most-likely 90' score. Round of 16 onward is the model's <b style='color:var(--ai)'>projection</b> — each team's chance to reach that slot; it firms up as games are played.",
    projectedTag:"projected", projOcc:"most-likely to reach this slot",
    standHeadKo:"Final group standings", standSubKo:"Final tables — all {tot} group games played. ✓ = through to the Round of 32.",
    legKoThrough:"through to R32", legKoOut:"eliminated", reg90:"90'", koPens:"pens", koAet:"a.e.t.", mlScore:"most-likely 90′ score", etPens:"level → extra time / pens",
    methodTitle:"How this stays honest.",
    method:"This is a <b>conditional</b> re-run of the exact pre-tournament engine — not a new model. Every finished match is <span class='em'>clamped</span> to its real scoreline (the sim reproduces it and draws no randomness for it) and only the unknown remainder is re-simulated. Team ratings are updated on the pitch by <b>FIFA's own SUM formula</b> (<code>P' = P + I·(W − We)</code>, divisor 600), so a result both fixes the past and shifts the projection for what's left. At zero games played this reproduces the frozen forecast <b>exactly</b> (verified). Neutral venue — no host advantage. Field rank is 1–48 within this field.",
    methodFoot:"{sims} simulations · seed {seed} · ratings: {rs} ({rsnap}) · source: ",
  },
  es: {
    back:"← Pronóstico pre-torneo y Árbol del Camino", accLink:"◷ Precisión del modelo →",
    h1:"Pronóstico en Vivo",
    tagline:"El mismo Monte Carlo honesto, ahora <b style='color:var(--sim)'>condicionado a los resultados reales</b>. Los partidos jugados quedan fijados a su marcador; las valoraciones cambian en el campo; el resto se vuelve a simular.",
    asOf:"AL", games:"partidos de grupo jugados", fetched:"datos", source:"fuente",
    titleHead:"Probabilidad de título — en vivo", titleSub:"Probabilidad de ser campeón en {sims} simulaciones condicionales · Δ frente al pronóstico congelado pre-torneo.",
    advHead:"Avanzar a eliminatorias", advSub:"P(superar el grupo → Dieciseisavos) · Δ frente al pronóstico congelado. Mayores cambios.",
    moversHead:"Cambios de valoración", moversSub:"Mayores variaciones de puntos FIFA, ganadas en el campo — {rule}",
    nextHead:"Próximos partidos — predicción del modelo", nextSub:"Forma cerrada del mismo modelo de Poisson sobre las valoraciones actualizadas. Victoria / empate / derrota + marcador más probable. Sin modelo aparte, sin ajustes manuales.",
    resHead:"Resultados hasta ahora", resSub:"Los partidos reales ya jugados, fijados en la simulación ({n} de {tot} de grupos).",
    pen:"pen", og:"p.p.",
    win:"V", draw:"E", loss:"D", likely:"probable", adv:"avanza",
    nextUp:"PRÓXIMO", noNext:"Aún no hay próximos partidos con ambos rivales definidos — aparecerán cuando se resuelvan los grupos.",
    fxMatches:"partidos", showAll:"Ver los {n} partidos restantes  ▾", showLess:"Solo la próxima jornada  ▴", grp:"Grupo",
    standHead:"Tabla de grupos — en vivo", standSub:"Tablas reales según los resultados; la última columna es la probabilidad del modelo de llegar a dieciseisavos.",
    standSubProj:"El orden FINAL esperado por el modelo — ▲/▼ muestra el cambio frente a la tabla actual. (Los puntos siguen siendo los de hoy.)",
    vNow:"Ahora", vProj:"Proyectado", cProj:"Proy",
    cPld:"PJ", cGD:"DG", cPts:"Pts", cAdv:"R32",
    legThrough:"top 2 asegurado", legThird:"vía mejor 3º", legOut:"fuera", legLive:"en disputa",
    advIf:"Llega a dieciseisavos si…", advThrough:"✓ clasificado", advOut:"✗ fuera",
    deltaFlat:"—",
    phaseKo:"● ELIMINATORIAS", matches:"partidos jugados",
    deepHead:"Probabilidad de avance", deepSub:"Probabilidad del modelo de llegar a la FINAL · {sims} simulaciones condicionales.",
    bracketHead:"Cuadro final", bracketSub:"Eliminación directa. En llaves definidas: probabilidad de cada lado de AVANZAR (incl. prórroga y penales) + el marcador más probable de 90'. De octavos en adelante es la <b style='color:var(--ai)'>proyección</b> del modelo — la probabilidad de cada equipo de llegar a esa llave; se concreta a medida que se juega.",
    projectedTag:"proyectado", projOcc:"más probable en esta llave",
    standHeadKo:"Tablas finales de grupos", standSubKo:"Tablas finales — {tot} partidos de grupo jugados. ✓ = clasificado a dieciseisavos.",
    legKoThrough:"clasificado a R32", legKoOut:"eliminado", reg90:"90'", koPens:"penales", koAet:"pror.", mlScore:"marcador más probable (90′)", etPens:"empate → prórroga / penales",
    methodTitle:"Cómo se mantiene honesto.",
    method:"Esto es una nueva corrida <b>condicional</b> del mismo motor pre-torneo — no un modelo nuevo. Cada partido jugado se <span class='em'>fija</span> a su marcador real (la simulación lo reproduce y no usa azar para él) y solo se vuelve a simular lo desconocido. Las valoraciones se actualizan en el campo con <b>la propia fórmula SUM de la FIFA</b> (<code>P' = P + I·(W − We)</code>, divisor 600), así un resultado fija el pasado y ajusta la proyección de lo que falta. Con cero partidos jugados esto reproduce el pronóstico congelado <b>exactamente</b> (verificado). Sede neutral — sin ventaja local. El puesto es ranking de campo (1–48) dentro de este grupo.",
    methodFoot:"{sims} simulaciones · semilla {seed} · valoraciones: {rs} ({rsnap}) · fuente: ",
  },
};
const t = (k, p) => { let s = (I18N[LANG] && I18N[LANG][k] != null) ? I18N[LANG][k] : (I18N.en[k] || k); if (p) for (const key in p) s = s.split("{" + key + "}").join(p[key]); return s; };
const rd = code => (ROUND[LANG][code] || code);
const r1 = x => (Math.round(x * 10) / 10).toFixed(1);
const pc = x => Math.round(x); // 0-1 -> %
const fmtDate = iso => { if (!iso) return ""; const [y,m,d] = iso.split("-").map(Number); return new Date(Date.UTC(y, m-1, d)).toLocaleDateString(LANG === "es" ? "es-ES" : "en-US", { month:"short", day:"numeric", timeZone:"UTC" }); };
const fmtDay = iso => { if (!iso) return ""; const [y,m,d] = iso.split("-").map(Number); return new Date(Date.UTC(y, m-1, d)).toLocaleDateString(LANG === "es" ? "es-ES" : "en-US", { weekday:"short", month:"short", day:"numeric", timeZone:"UTC" }); };
let fxExpanded = false; // "Next matches" shows the next matchday by default; toggle reveals the rest
let standView = "now"; // group standings: "now" (points table) ⇄ "proj" (model's expected final order)
// Kickoff shown in US Eastern. We convert from the absolute ISO instant via the
// America/New_York zone, which resolves to EDT (UTC−4) in June automatically; we
// label it "ET" so it's correct year-round. Falls back to the raw venue string.
const fmtKO = (iso, raw) => {
  if (iso) {
    const dt = new Date(iso);
    if (!isNaN(dt)) {
      const time = dt.toLocaleTimeString(LANG === "es" ? "es-ES" : "en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" });
      return `${time} <span class="tz">ET</span>`;
    }
  }
  return raw || "";
};

// signed delta chip (input is percentage points)
function deltaChip(d) {
  if (Math.abs(d) < 0.05) return `<span class="delta flat">${t('deltaFlat')}</span>`;
  const cls = d > 0 ? "up" : "down", arrow = d > 0 ? "▲" : "▼";
  return `<span class="delta ${cls}">${arrow} ${d > 0 ? "+" : "−"}${r1(Math.abs(d))}</span>`;
}

function render() {
  const m = L.meta;
  document.querySelectorAll("#langToggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === LANG));
  document.getElementById("backlink").href = "index.html" + (LANG === "es" ? "?lang=es" : "");
  document.getElementById("backlink").textContent = t('back');
  document.getElementById("accLink").href = "accuracy.html" + (LANG === "es" ? "?lang=es" : "");
  document.getElementById("accLink").textContent = t('accLink');
  document.getElementById("h1").textContent = t('h1');
  document.getElementById("tagline").innerHTML = t('tagline');
  const simsTxt = (m.sims || 0).toLocaleString(LANG === "es" ? "es-ES" : "en-US");

  // ---- tournament phase: once every group game is played we switch to KNOCKOUT mode ----
  const koPhase = m.groupPlayedCount >= m.groupTotal;
  const TOTAL_MATCHES = m.groupTotal + 32; // 72 group + 32 knockout = 104 for WC2026
  const koResults = (L.results || []).filter(r => r.round && r.round !== "group");
  const koProj = (L.projections || []).filter(p => p.round && p.round !== "group");
  // the 32 qualifiers = every team in an R32 tie (played or upcoming) — the source of truth
  // for "who's through", since the group-stage clinch flags are GD-agnostic and now stale.
  const qualified = new Set();
  [...koResults.filter(r => r.round === "R32"), ...koProj.filter(p => p.round === "R32")]
    .forEach(x => { qualified.add(x.home); qualified.add(x.away); });
  // Complete name→{code,fieldRank} map. reach[] only carries the 32 KO survivors, so we
  // seed codes from standings (all 48 teams) and overlay reach for ranks/odds. Used by the
  // bracket AND the results list (which shows eliminated teams too).
  const teamMeta = {};
  for (const g of (L.standings || [])) for (const r of g.rows) teamMeta[r.name] = { code: r.code };
  for (const r of (L.reach || [])) teamMeta[r.name] = { ...teamMeta[r.name], ...r };
  const codeOf = n => (teamMeta[n] || {}).code;
  const rankOf = n => (teamMeta[n] || {}).fieldRank;

  // as-of stamp — group-stage progress during groups, whole-tournament progress in KO
  const progPct = koPhase ? (100 * m.playedCount / TOTAL_MATCHES) : (100 * m.groupPlayedCount / m.groupTotal);
  document.getElementById("stamp").innerHTML =
    `<span>${t('asOf')} <b>${fmtDate(m.asOfDate)}</b></span>` +
    (koPhase
      ? `<span style="color:var(--gold);font-weight:700">${t('phaseKo')}</span><span><b>${m.playedCount}</b>/${TOTAL_MATCHES} ${t('matches')}</span>`
      : `<span><b>${m.groupPlayedCount}</b>/${m.groupTotal} ${t('games')}</span>`) +
    `<span class="prog"><i style="width:${progPct.toFixed(1)}%"></i></span>` +
    `<span>${t('source')}: <a href="${m.sourceUrl}" target="_blank" rel="noopener">openfootball</a></span>`;

  // ---- title odds (top 12) ----
  const champs = L.champions.slice(0, 12);
  const maxPct = champs[0] ? champs[0].pct : 1;
  document.getElementById("titleHead").textContent = t('titleHead');
  document.getElementById("titleSub").textContent = t('titleSub', { sims: simsTxt });
  document.getElementById("titleOdds").innerHTML = champs.map(c => `
    <div class="oddsrow">
      <img class="flag" src="${FLAG(c.code)}" alt="">
      <div style="min-width:0">
        <div class="nm">${teamName(c.name)}<span class="rk">#${c.fieldRank}</span></div>
        <div class="bar"><i style="width:${(100*c.pct/maxPct).toFixed(1)}%"></i></div>
      </div>
      <div><span class="val">${r1(c.pct)}%</span>${deltaChip(c.delta)}</div>
    </div>`).join("");

  // ---- second panel: group-stage = advancement movers; KO phase = deep-run (reach-final) odds ----
  if (koPhase) {
    // groups are settled (advance% all 100), so surface how far each survivor is projected to go.
    const surv = [...L.reach].filter(c => (c.final || 0) > 0).sort((a, b) => b.final - a.final).slice(0, 12);
    const maxF = surv.length ? surv[0].final : 1;
    document.getElementById("advHead").textContent = t('deepHead');
    document.getElementById("advSub").textContent = t('deepSub', { sims: simsTxt });
    document.getElementById("advOdds").innerHTML = surv.map(c => `
      <div class="oddsrow">
        <img class="flag" src="${FLAG(c.code)}" alt="">
        <div style="min-width:0">
          <div class="nm">${teamName(c.name)}<span class="rk">#${c.fieldRank}</span></div>
          <div class="bar"><i style="width:${(100*c.final/maxF).toFixed(1)}%"></i></div>
        </div>
        <div><span class="val">${r1(100*c.final/m.sims)}%</span></div>
      </div>`).join("");
  } else {
    // advancement: sort by |advanceDelta|, show top 12 movers
    const adv = [...L.reach].sort((a,b) => Math.abs(b.advanceDelta) - Math.abs(a.advanceDelta)).slice(0, 12);
    document.getElementById("advHead").textContent = t('advHead');
    document.getElementById("advSub").textContent = t('advSub');
    document.getElementById("advOdds").innerHTML = adv.map(c => `
      <div class="oddsrow">
        <img class="flag" src="${FLAG(c.code)}" alt="">
        <div style="min-width:0">
          <div class="nm">${teamName(c.name)}<span class="rk">#${c.fieldRank}</span></div>
          <div class="bar"><i style="width:${c.advancePct.toFixed(1)}%"></i></div>
        </div>
        <div><span class="val">${r1(c.advancePct)}%</span>${deltaChip(c.advanceDelta)}</div>
      </div>`).join("");
  }

  // ---- rating movers ----
  document.getElementById("moversHead").textContent = t('moversHead');
  document.getElementById("moversSub").textContent = t('moversSub', { rule: m.eloRule });
  document.getElementById("movers").innerHTML = (L.movers || []).slice(0, 10).map(mv => {
    const up = mv.delta >= 0;
    return `<div class="mover">
      <img class="flag" src="${FLAG(mv.code)}" alt="">
      <span class="nm">${teamName(mv.name)}</span>
      <span class="gp">${mv.played}g</span>
      <span class="d ${up ? "up" : "down"}">${up ? "+" : "−"}${Math.round(Math.abs(mv.delta))}</span>
    </div>`;
  }).join("");

  // ---- group standings. During groups: live tables + status + Now⇄Projected toggle.
  //      In KO phase: settled FINAL tables; status is qualified-based (the 32 R32 entrants),
  //      the now-no-op toggle is hidden, and the last column shows ✓ / — instead of advance%.
  const statusOf = r => koPhase ? (qualified.has(r.name) ? "through" : "out") : r.status;
  const statusByName = {};
  for (const g of (L.standings || [])) for (const r of g.rows) statusByName[r.name] = statusOf(r);
  document.getElementById("standHead").textContent = t(koPhase ? 'standHeadKo' : 'standHead');
  document.getElementById("standToggle").style.display = koPhase ? "none" : "";
  document.querySelectorAll("#standToggle button").forEach(b => b.textContent = t(b.dataset.view === "now" ? "vNow" : "vProj"));
  const projArrow = r => { const d = r.projectedPos - r.pos; return d < 0 ? '<span class="ar up">▲</span>' : d > 0 ? '<span class="ar dn">▼</span>' : '<span class="ar fl">—</span>'; };
  function renderStandings() {
    const proj = !koPhase && standView === "proj";
    document.querySelectorAll("#standToggle button").forEach(b => b.classList.toggle("active", b.dataset.view === standView));
    document.getElementById("standSub").textContent = koPhase ? t('standSubKo', { tot: m.groupTotal }) : (proj ? t('standSubProj') : t('standSub'));
    document.getElementById("groups").innerHTML = (L.standings || []).map(g => {
      const rows = proj ? [...g.rows].sort((a, b) => a.projectedPos - b.projectedPos) : g.rows;
      return `
      <div class="grp-card">
        <h3>${t('grp')} ${g.id}</h3>
        <table class="stbl">
          <thead><tr><th class="l">${proj ? t('cProj') : "#"}</th><th class="l"></th><th>${t('cPld')}</th><th>${t('cGD')}</th><th>${t('cPts')}</th><th>${t('cAdv')}</th></tr></thead>
          <tbody>${rows.map(r => { const st = statusOf(r); return `
            <tr class="${st}">
              ${proj ? `<td class="num">${r.projectedPos} ${projArrow(r)}</td>` : `<td>${r.pos}</td>`}
              <td class="team"><span class="tin"><span class="dot ${st}"></span><img class="flag" src="${FLAG(r.code)}" alt=""><span class="nm">${teamName(r.name)}</span>${st === "through" ? '<span class="ck">✓</span>' : ""}</span></td>
              <td>${r.p}</td>
              <td>${r.gd > 0 ? "+" + r.gd : r.gd}</td>
              <td class="pts">${r.pts}</td>
              <td class="adv">${koPhase ? (st === "through" ? '<span class="ck">✓</span>' : "—") : (st === "out" ? "—" : r1(r.advancePct) + "%")}</td>
            </tr>`; }).join("")}
          </tbody>
        </table>
      </div>`;
    }).join("");
  }
  renderStandings();
  document.querySelectorAll("#standToggle button").forEach(b => b.onclick = () => { if (b.dataset.view !== standView) { standView = b.dataset.view; renderStandings(); } });
  document.getElementById("glegend").innerHTML =
    (koPhase ? [["through", t('legKoThrough')], ["out", t('legKoOut')]]
             : [["through", t('legThrough')], ["live", t('legLive')], ["third", t('legThird')], ["out", t('legOut')]])
      .map(([c, lbl]) => `<span class="k"><span class="dot ${c}"></span>${lbl}</span>`).join("");

  // ---- next matches (groups) / knockout bracket (KO phase) ----
  document.getElementById("nextHead").textContent = t(koPhase ? 'bracketHead' : 'nextHead');
  document.getElementById("nextSub").innerHTML = t(koPhase ? 'bracketSub' : 'nextSub');
  const fxRoot = document.getElementById("fixtures");
  const proj = L.projections || [];
  // projections are date-sorted; collapse into one group per matchday
  const fxGroups = [];
  for (const p of proj) {
    const g = fxGroups[fxGroups.length - 1];
    if (g && g.date === p.date) g.list.push(p); else fxGroups.push({ date: p.date, list: [p] });
  }
  // one team's "reach R32 if…" row — conditional advancement, or a settled flag
  const advRow = (name, c) => {
    const st = statusByName[name];
    if (st === "through") return `<div class="advrow"><span class="t">${teamName(name)}</span><span class="done through">${t('advThrough')}</span></div>`;
    if (st === "out") return `<div class="advrow"><span class="t">${teamName(name)}</span><span class="done out">${t('advOut')}</span></div>`;
    if (!c || c.ifWin == null) return `<div class="advrow"><span class="t">${teamName(name)}</span></div>`;
    const seg = (cls, lab, v) => `<span class="seg ${cls}">${lab} ${pc(v*100)}%</span>`;
    return `<div class="advrow"><span class="t">${teamName(name)}</span>${seg("w", t('win'), c.ifWin)}${seg("d", t('draw'), c.ifDraw)}${seg("l", t('loss'), c.ifLoss)}</div>`;
  };
  const fxCard = p => {
    const h = pc(p.pHome*100), d = pc(p.pDraw*100), a = pc(p.pAway*100);
    const showAdv = p.cond && (p.cond.home || p.cond.away);
    return `<div class="fx ${p.date === L.nextDate ? "next" : ""}">
      <div class="fxhead"><span class="ko">${fmtKO(p.kickoff, p.time)}</span><span class="grp">${p.group ? t('grp') + " " + p.group : rd(p.round)}</span></div>
      <div class="teams">
        <div class="side home"><img class="flag" src="${FLAG(p.homeCode)}" alt=""><span class="nm">${teamName(p.home)}</span></div>
        <div class="score">${p.likely.home}–${p.likely.away}<small>${t('likely')}</small></div>
        <div class="side away"><span class="nm">${teamName(p.away)}</span><img class="flag" src="${FLAG(p.awayCode)}" alt=""></div>
      </div>
      <div class="wdl">
        <div class="track"><span class="seg-h" style="width:${h}%"></span><span class="seg-d" style="width:${d}%"></span><span class="seg-a" style="width:${a}%"></span></div>
        <div class="labels"><span><b>${h}%</b> ${t('win')}</span><span>${d}% ${t('draw')}</span><span><b>${a}%</b> ${t('win')}</span></div>
      </div>
      ${showAdv ? `<div class="adv"><div class="lbl">${t('advIf')}</div>${advRow(p.home, p.cond.home)}${advRow(p.away, p.cond.away)}</div>` : ""}
    </div>`;
  };
  function renderFixtures() {
    if (!proj.length) { fxRoot.innerHTML = `<p class="sub">${t('noNext')}</p>`; return; }
    const shown = fxExpanded ? fxGroups : fxGroups.slice(0, 1);
    const remaining = proj.length - shown.reduce((n, g) => n + g.list.length, 0);
    fxRoot.innerHTML = shown.map((g, gi) => `
      <div class="fxgroup">
        <div class="fxday">
          ${gi === 0 && g.date === L.nextDate ? `<span class="daytag">★ ${t('nextUp')}</span>` : ""}
          <span class="d">${fmtDay(g.date)}</span>
          <span class="cnt">${g.list.length} ${t('fxMatches')}</span>
        </div>
        <div class="fixtures">${g.list.map(fxCard).join("")}</div>
      </div>`).join("") +
      (fxGroups.length > 1
        ? `<button class="fxmore" id="fxToggle">${fxExpanded ? t('showLess') : t('showAll', { n: remaining })}</button>`
        : "");
    const tog = document.getElementById("fxToggle");
    if (tog) tog.onclick = () => { fxExpanded = !fxExpanded; renderFixtures(); };
  }
  // ---- knockout bracket: real R32 ties as tie-cards with 2-way ADVANCE bars (incl. ET/pens).
  //      Handles both upcoming ties (from projections) and played ties (from results), so it
  //      transitions automatically as KO games are clamped. R16+ slots arrive in a later ticket.
  const advPct = x => Math.round(x * 100);
  function tieCard(it) {
    const rnd = rd(it.round);
    if (it.kind === "played") {
      const hw = it.winner === it.home, aw = it.winner === it.away;
      const tag = it.decidedBy && it.decidedBy !== "REG" ? (it.decidedBy === "PENS" ? t('koPens') : t('koAet')) : "";
      const prow = (nm, goals, win, lose) => `<div class="row ${win ? "fav" : lose ? "lose" : ""}"><img class="flag" src="${FLAG(codeOf(nm))}" alt=""><span class="nm">${teamName(nm)}</span>${win ? '<span class="ck">✓</span>' : ""}<span class="sc">${goals}</span></div>`;
      return `<div class="tie done">
        <div class="tiehead"><span class="rnd">${rnd}</span><span class="ko">${fmtDate(it.date)}${tag ? " · " + tag : ""}</span></div>
        ${prow(it.home, it.homeGoals, hw, aw)}
        ${prow(it.away, it.awayGoals, aw, hw)}
      </div>`;
    }
    const ah = advPct(it.advanceHome), aa = 100 - ah, homeFav = it.advanceHome >= 0.5, next = it.date === L.nextDate;
    // A level 90' score doesn't end a knockout tie — it goes to extra time, then penalties.
    // So we show the most-likely 90' scoreline, but flag a draw as heading to ET/pens; the
    // advance % (which already includes ET & penalties) is who the model expects to go through.
    const drawn = it.likely.home === it.likely.away;
    const urow = (nm, code, adv, fav) => `<div class="row ${fav ? "fav" : ""}"><img class="flag" src="${FLAG(code)}" alt=""><span class="nm">${teamName(nm)}<span class="rk">#${rankOf(nm)}</span></span><span class="adv">${adv}%</span></div>`;
    return `<div class="tie ${next ? "next" : ""}">
      <div class="tiehead"><span class="rnd">${rnd}</span><span class="ko">${next ? '<span class="star">★ </span>' : ""}${fmtDate(it.date)} · ${fmtKO(it.kickoff, it.time)}</span></div>
      ${urow(it.home, it.homeCode, ah, homeFav)}
      ${urow(it.away, it.awayCode, aa, !homeFav)}
      <div class="abar"><span class="ah" style="width:${ah}%"></span><span class="aa" style="width:${aa}%"></span></div>
      <div class="foot"><b class="ml">${it.likely.home}–${it.likely.away}</b> ${drawn ? t('etPens') : t('mlScore')}</div>
    </div>`;
  }
  // Projected (R16→final) tie-card: the two most-likely occupants of a future slot, each with
  // its MARGINAL probability of reaching that slot. Dashed styling + "projected" label make
  // clear it isn't a real draw; it converges to the real teams as the feeder games are played.
  function projTieCard(pm) {
    const h = pm.home[0], a = pm.away[0];
    if (!h || !a) return "";
    const favName = pm.favorite && pm.favorite.name;
    const prow = o => `<div class="row ${o.name === favName ? "fav" : ""}"><img class="flag" src="${FLAG(o.code)}" alt=""><span class="nm">${teamName(o.name)}<span class="rk">#${o.fieldRank}</span></span><span class="adv">${Math.round(o.p * 100)}%</span></div>`;
    return `<div class="tie proj">
      <div class="tiehead"><span class="rnd">${rd(pm.round)}</span><span class="ko">${t('projectedTag')}</span></div>
      ${prow(h)}${prow(a)}
      <div class="foot">${t('projOcc')}</div>
    </div>`;
  }
  const byDate = (a, b) => String(a.date).localeCompare(String(b.date)) || String(a.kickoff || a.time || "").localeCompare(String(b.kickoff || b.time || ""));
  const roundSection = (label, cardsHtml, projected) =>
    `<div class="roundsection"><div class="roundhead">${label}${projected ? `<span class="ptag">${t('projectedTag')}</span>` : ""}</div><div class="bracketgrid">${cardsHtml}</div></div>`;
  function renderBracket() {
    const sections = [];
    for (const round of ["R32", "R16", "QF", "SF", "final"]) {
      // real ties for this round (played + upcoming with both teams known)
      const real = [
        ...koResults.filter(r => r.round === round).map(r => ({ kind: "played", ...r })),
        ...koProj.filter(p => p.round === round).map(p => ({ kind: "next", ...p })),
      ].sort(byDate);
      const resolved = new Set(real.map(r => [r.home, r.away].sort().join("|")));
      // projected ties for slots not yet resolved (excluded once their real pairing exists)
      const proj = (L.projectedBracket || []).filter(b =>
        b.round === round && b.home[0] && b.away[0] && !resolved.has([b.home[0].name, b.away[0].name].sort().join("|")));
      const cards = [...real.map(tieCard), ...proj.map(projTieCard)].join("");
      if (cards) sections.push(roundSection(rd(round), cards, proj.length > 0));
    }
    fxRoot.innerHTML = sections.length ? sections.join("") : `<p class="sub">${t('noNext')}</p>`;
  }
  if (koPhase) renderBracket(); else renderFixtures();
  // In KO phase the bracket is the headline — promote it above the now-settled group tables.
  if (koPhase) { const pb = document.getElementById("panelBracket"), ps = document.getElementById("panelStandings"); if (pb && ps) ps.parentNode.insertBefore(pb, ps); }

  // ---- results so far ----
  document.getElementById("resHead").textContent = t('resHead');
  document.getElementById("resSub").textContent = t('resSub', { n: m.groupPlayedCount, tot: m.groupTotal });
  const res = [...(L.results || [])].reverse(); // most recent first
  // Real scorers (display-only; openfootball). Rendered only when the per-side counts
  // reconcile with the scoreline — otherwise score-only, never a partial list.
  const scorerLine = s => {
    const mk = s.og ? ` <span class="mk">(${t('og')})</span>` : s.pen ? ` <span class="mk">(${t('pen')})</span>` : "";
    return `<span class="g">${s.name||""}${s.minute?`<span class="mn">${s.minute}'</span>`:""}${mk}</span>`;
  };
  const scorersHTML = r => {
    if (!r.scorersComplete || !Array.isArray(r.scorers) || !r.scorers.length) return "";
    const col = side => r.scorers.filter(s => s.side===side).map(scorerLine).join("<br>");
    return `<div class="scorers"><div class="gh">${col("home")}</div><div class="ga">${col("away")}</div></div>`;
  };
  document.getElementById("results").innerHTML = res.map(r => {
    const hw = r.winner === r.home, aw = r.winner === r.away;
    const tag = r.decidedBy && r.decidedBy !== "REG" ? (r.decidedBy === "PENS" ? t('koPens') : t('koAet')) : "";
    return `<div class="result">
      <div class="rs h"><img class="flag" src="${FLAG(codeOf(r.home))}" alt=""><span class="nm ${hw?"win":""}">${teamName(r.home)}</span></div>
      <div style="text-align:center"><span class="sc">${r.homeGoals}–${r.awayGoals}</span><div class="meta">${fmtDate(r.date)}${tag?" · "+tag:""}</div></div>
      <div class="rs a"><span class="nm ${aw?"win":""}">${teamName(r.away)}</span><img class="flag" src="${FLAG(codeOf(r.away))}" alt=""></div>
      ${scorersHTML(r)}
    </div>`;
  }).join("");

  // ---- method ----
  document.getElementById("method").innerHTML =
    `<b>${t('methodTitle')}</b> ${t('method')}<br><br>` +
    `<span style="font-family:var(--mono);font-size:11px">${t('methodFoot', { sims: simsTxt, seed: m.masterSeed, rs: m.ratingSource, rsnap: m.ratingSnapshot })}<a href="${m.sourceUrl}" target="_blank" rel="noopener">${m.source}</a></span>`;
}

document.querySelectorAll("#langToggle button").forEach(b => b.onclick = () => {
  if (b.dataset.lang === LANG) return;
  LANG = b.dataset.lang; localStorage.setItem("wc_lang", LANG); document.documentElement.lang = LANG;
  render();
});
render();
</script>
</body>
</html>
