# Publishes the self-contained app in /app to GitHub Pages at the repo root URL
# (https://<user>.github.io/<repo>/). Only /app is deployed; the offline pipeline,
# data, and docs stay in the repo but are not part of the published site.
#
# One-time setup: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".
name: Deploy app to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['app/**', '.github/workflows/pages.yml']
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# never let two deploys clobber each other; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app # publish ONLY the self-contained app folder

      # The Pages backend intermittently returns "Deployment failed, try again
      # later" — a transient service error that deploy-pages treats as terminal
      # and does NOT retry. Attempt the deploy up to 3 times, backing off
      # between tries, so a single backend hiccup doesn't drop the deploy.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before first deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: deployment_retry_1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before second deploy retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure'
        run: sleep 60
      - id: deployment_retry_2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure'
        uses: actions/deploy-pages@v4
